人无不无己，但你能决定「自己」无不无己。团队的合一，不是等「所有人都变好了」才可能（那永远等不到）；它是从「我先无己、我先让耶稣在我这个肢体里作王」开始的。你管不了那个争的人、推卸的人（那是他与神之间的功课），但你可以求神先对付你、先让你成为那个谦卑、成全、饶恕、连于头的肢体。当你这样做，你至少让「合一」在你这里不被破坏；而且你的无己，常常会像涟漪一样，悄悄带动、软化身边的人（谦卑带动谦卑）。所以，亲爱的，「身体的服事」之所以难，不是这个真理有问题，而是因为它要求「无己」——而无己本来就是一生最难、也最宝贵的功课。但也正因如此，团队服事是神给你的大礼物：它是一面照妖镜，照出你里面还没被对付的「己」；也是一个健身房，在一次次的摩擦、忍耐、饶恕、成全里，把你的生命磨得越来越像耶稣。真正的合一，不是「没有不同的人勉强凑在一起」，而是「一群愿意无己、一起降服于耶稣这个头、彼此相爱成全的人」，活出「不见一人、只见耶稣」的身体。那不容易，但那正是复兴的实际。从你自己先无己开始，从你先连于那唯一的头开始。"}},{"h":"三进入国度的服事，活出更深的隐藏","paras":["在小范围里服事，很容易被看见——就像在鱼缸里，每条鱼都很明显。⟦g:但当你进入「国度」的服事，范围变大、焦点变广，自然就隐藏了⟧——就像在大海中，你不再是焦点，神才是焦点。","国度的服事，有一个关键：⟦b:放下拥有，只在乎付出⟧。⟦s:不是建立自己的版图⟧；⟦g:而是建立神的国；不是让人记得我，而是让人认识耶稣⟧。","这样的生命，就是：⟦g:无己的生命、仆人的生命、国度的生命⟧。⟦g:不是建立我的事工，是建立神的国；不是扩展我的影响，是扩展耶稣的荣耀；越隐藏，越被神使用⟧。"],"pq":"服事的最高境界，不是你多有影响力，而是你让耶稣有多少影响力——当人看不见你，却看见耶稣，这就是最荣耀的服事。","deeper":{"q":"想更深？「建立神的国，不是建立我的事工」——可是我们不是也常讲要「建立属神的体系、建立神国的领域」吗？这跟「建立我的事工」差在哪里？我怎么知道，我所做的，是在「建立神的国」，还是不知不觉在「建立自己的版图」？","a":"这是一个极为关键、也极需要分辨的问题——因为「建立神的国」和「建立自己的版图」，外表常常看起来一模一样（同样是聚会增长、事工扩展、人数变多），里面的「动机与焦点」却天差地别。先澄清：「建立属神的体系、建立神国的领域」确实是321的「一个目的」，是神所喜悦、要我们去做的——所以「扩展、建造」本身完全不是错。问题从来不在「有没有事工」，而在「这扩展，是『谁的国』在扩展、为了『谁的荣耀』、由『谁作王』」。给你几面「照妖镜」，帮你诚实检视。第一面镜子：「王位上坐的是谁？」——这是最核心的。「神的国」是「神作王」的国（这正是两个核心之一：让耶稣作王）。真正建立神国的人，在他所建造的一切里，耶稣是王、是头、是中心、是发号施令的那一位；他自己只是仆人、管家，凡事求问「主，祢要怎么做」。而「建立自己版图」的人，虽然口称为神，实际上「自己才是那个王」——是照「我」的意思、计画、方法在建造，神只是被拿来「祝福我的计画」的。问自己：是「我听主的、让主作王」，还是「我作主、求主配合我」？第二面镜子：「荣耀归给谁？」（上一课的功课）——建立神国的人，一切果效他都归给神，喜乐是「看见耶稣被高举」；建立版图的人，事工的成功会悄悄喂养他「是我建立的、看我多行」，享受的是「自己被看见、被尊崇」。第三面镜子：「是成全人、释放人，还是拥有人、控制人？」——建立神国的人是「父母的心」，乐意成全、释放别人、甚至让别人超过自己（他必兴旺，我必衰微）；建立版图的人倾向「拥有、抓住、控制」，要人都归我带领、都需要我，怕人独立、怕失去掌控。问自己：我是巴不得我带的人赶快独立、去建立更多（哪怕离开我），还是暗暗希望他们永远需要我、留在我的圈子里？第四面镜子：「在乎付出，还是在乎拥有？」——建立神国的人焦点在「我能付出、给出去、成全多少」；建立版图的人焦点在「我能拥有、掌握、累积多少（人数、资源、名声）」。一个是流出去的生命，一个是抓进来的生命。第五面镜子：「能不能为了神整体的国，牺牲我这一块？」——真正建立神国的人，能乐见别的教会、别的同工比我兴旺（因为那也是神的国在扩展）；愿意为神更大的计画放下我自己这一块；不会把「别人的事工」当竞争对手。建立版图的人则会把焦点缩在「我这一块」——别人兴旺他会嫉妒、有威胁感。问自己：当别人比我兴旺时，我是真心为神的国欢喜，还是心里酸酸的、觉得被比下去？这几面镜子照下来，你会发现：「建立神国」与「建立版图」的差别，全在「无己」与「有己」。建立神国，是无己的——让耶稣作王、荣耀归神、成全释放人、在乎付出、心怀神整体的国；建立版图，是有己的——自己作王、荣耀归己、拥有控制人、在乎累积、只顾我这一块。而最诚实、也最让人谦卑的提醒是：这两者的界线，在我们心里常常是「混杂」的、会「悄悄滑动」的。没有人是纯粹的，我们在建立神国的同时，那个「有己」常常会偷偷混进来、想分一杯荣耀、想扩张一点自己。所以这不是一次就分辨清楚、从此高枕无忧的事，而是需要「天天用这些镜子照自己、天天把混进来的『己』交给神对付、天天重新校准让耶稣作王、让耶稣得荣耀」的功课。这正是为什么「神」（荣耀归神）放在灵悟命侍神的「最后、也是最关键」的一步——因为它是保守你所建造的，真正是「神的国」而不是「自己版图」的守门人。所以，去建立、去扩展神的国吧——这是神的呼召，不要因噎废食。只是要天天、诚实地用这几面镜子照自己：王位上坐的是耶稣吗？荣耀我归给神了吗？我是在成全释放人，还是拥有控制人？我在乎的是付出还是拥有？我能为神整体的国放下我这一块吗？当你越无己——越让耶稣作王、越把荣耀归给神、越成全人、越在乎付出、越心怀神整体的国——你所建立的，就越是「神的国」；你也就越活出这一课最美的境界：「不是建立我的事工，是建立神的国；不是扩展我的影响，是扩展耶稣的荣耀」——让人不见你，只见耶稣。"}}],"focus":"当我服事、分享、被看见的时候，\n结束之后，\n人记得的，\n是「我这个人真不错」，\n还是「他们遇见了耶稣」？","hope":{"t":"✺ 你最美的时刻，是让人只看见耶稣","paras":["也许你心里偶尔会渴望被看见、被肯定、被记得——这是人最自然的渴望。但这一课把服事最高、也最自由的境界交给你：⟦b:不见一人，只见耶稣⟧。真正成熟的服事，不是你站得多高、多被看见，而是你让所有人的眼目，都越过你，看见了耶稣。","⟦g:当你选择隐藏、不争、成全别人、活在身体里、让耶稣作唯一的头，你不是「消失了、没价值了」，而是进入了最深的自由——你再不必靠被看见来证明自己⟧。就像变像山上，当摩西、以利亚都隐去，门徒「举目不见一人，只见耶稣」。那一刻，不是你的失落，是你最荣耀的成全：你成了一扇透明的窗，人透过你，看见的，是基督的荣光。"]},"still":"此刻安静——\n诚实地问自己：\n我里面，\n是否还有一个「渴望被看见、\n怕被忽略、怕被取代」的我？\n我愿意把它，交给主吗？","still_hint":"不必否认，也不必自责。\n安静一分钟，\n把那份渴望交给主：\n「主啊，我愿意隐藏，\n让人不见我，只见祢。」","steps":[{"act":"刻意把焦点从自己转向耶稣：在任何服事、分享、见证中，少提自己、多提耶稣，让人记得的是「神做了什么、神如何工作」。","meta":""},{"act":"操练「不抢位置」：在团队中不争功、不抢话、不强出头；学习让别人被成全、让别人被看见。你越放下，神越提升你。","meta":""},{"act":"主动进入「带—陪—放」的传承：不要只做事，要开始带人、陪人、放人，让生命不断繁殖，让焦点不再集中在你，而是扩散、最终归给耶稣。","meta":""}],"declare":"主耶稣，我愿意隐藏自己，高举祢。\n我不再追求被看见，我只渴望祢被高举。\n我宣告：不见一人，只见耶稣；\n不是我活，乃是基督在我里面活；\n一切荣耀，都归给祢！\n愿我的生命，成为指向祢的记号！\n奉主耶稣的名，阿们。","share":[{"tag":"领受","q":"「不见一人，只见耶稣」——这个服事的最高境界，跟你原本以为的「成功服事」（被看见、有影响力）有什么不同？它给你什么释放？"},{"tag":"省察","q":"诚实面对：我里面是否还有一个「渴望被看见、怕被忽略、怕被取代、想抢焦点」的部分？它最常在什么情况下冒出来？"},{"tag":"同行","q":"这礼拜，请你刻意操练一次「隐藏」——让出一个本可被看见的机会给别人，或在分享中刻意高举耶稣而非自己。说出来，让小家的家人陪你一起、彼此守望。"}],"next":"灵悟命侍神，走在得胜的服事之路","prog":"93"},{"n":171,"unit":"第十单元 · 服侍——灵悟命侍神的得胜之路","title":"灵悟命侍神，\n一生的道路","no":"171","greet":"愿你来到主的面前，得享安息","verse":"体贴肉体的，就是死；体贴圣灵的，乃是生命、平安。","verse_ref":"罗马书 8:6","bigidea":"本课核心（全课程终章）：一个人如何一生走在神的道路上，不偏离、不枯干、不跌倒？答案就在五个字——灵、悟、命、侍、神。这不是五个阶段，而是一条持续循环、一生要走的生命之路。它的核心是「无己」：有己，就无路；无己，就有路。耶稣说：「我就是道路。」","lead":"我们来到《晨读321》的最后一课。一个人如何一生走在神的道路上，不偏离、不枯干、不跌倒？答案就在这五个字——灵—悟—命—侍—神。这不是五个阶段，而是一条「持续循环的生命之路」；不是走过就好，而是每天都在走。从信主开始，直到见主面，我们都要不断活在这条路上。而这条路的核心，就是一个关键：无己。因为——有己，就无路；无己，就有路。耶稣说：「我就是道路。」当我们放下自己，我们就走在这条生命之路上。","sections":[{"h":"一「灵」与「悟」：生命的起点——圣灵引导与真理更新","paras":["「体贴肉体的，就是死；体贴圣灵的，乃是生命、平安。」（罗8:6）⟦b:生命的起点，不在行为，在「选择跟随谁」⟧——⟦s:跟随肉体 → 死亡⟧；⟦g:跟随圣灵 → 生命与平安⟧。「灵」就是：圣灵是我的引导。不靠自己的聪明、过去的经验，而是每一刻都问：圣灵要我怎么做？","而「悟」，就是：圣经是我的准则。「不要效法这个世界，只要心意更新而变化。」（罗12:2）⟦g:圣灵会引导我们进入真理，而真理会更新我们的观念——观念改变 → 生命改变；生命改变 → 生活改变⟧。","⟦g:不是凭感觉活，是凭圣灵活；不是照自己的想法，是照神的真理；从地上的观点，进入天上的观点⟧。"],"deeper":{"q":"想更深？走到全课程的最后一课，回头看——「灵悟命侍神」这条服事的路，跟整本《晨读321》一路走来教的「三个基础、两个核心、一个目的」，到底是什么关系？这五个字，是不是把前面170课全都收拢起来了？","a":"是的，你看见了——「灵悟命侍神」这五个字，正是把整本《晨读321》、把整个321理念，收拢成一条「可以天天走、一生走」的生命之路。让我们在这最后一课，把这条主线完整地串起来。先看「灵悟命侍神」如何完整对应321的「三个基础、两个核心」：「灵」＝第一个基础，「圣灵是我的引导」；「悟」＝第二个基础，「圣经是我的准则」（领悟并遵行真理）；「命」＝第三个基础，「耶稣是我的榜样」（活出耶稣的生命）；「侍」＝第一个核心，「让耶稣作王」；「神」＝第二个核心，「让耶稣得到一切的荣耀」。所以「灵悟命侍神」＝（三个基础）＋（两个核心）——它把321最核心的「3」和「2」，按生命流动的次序，串成了一条动线。那「1」（一个目的：建立属神的体系）呢？它就是这条路走出来、流出去的「结果」——当许多人都走在灵悟命侍神的路上、活出无己、彼此相爱、传承生命，「属神的体系、神国的领域」就在地上被建立起来了。所以这五个字，把321的「3、2、1」全都收拢、贯穿了。再看它如何收拢整本《晨读321》一路走来的脉络。回顾这趟旅程：开头，我们学「迈进大复兴、从巴比伦出来、对准耶稣」；接着进入「从心开始、用心靠圣灵」——这是「灵」的根基；然后是「观念的改变」（八大步骤、改变观点）——这是「悟」的功课；再来是复兴之路的核心「无己、谦卑、舍己」——这是「命」的根；第八单元「生命」（看听想讲行的更新）——这是「命」的培养，把无己的生命真实地活出来；第九单元「关系」（重整次序）——这是无己的生命流向关系；最后第十单元「服侍」（灵悟命侍神）——这是生命流向关系之后，进一步流出去服事、让耶稣作王、让耶稣得荣耀。你看，整本书的脉络，正是「灵悟命侍神」这条路的铺展。而贯穿这一切的，是那个一再出现的次序——「先生命、再关系、后事工」，以及那个一再出现的核心——「无己」。为什么「无己」是这整条路的核心、是这最后一课的钥匙？因为「有己，就无路；无己，就有路」。你回想整趟旅程会发现：人一切的问题，根源都是「有己」（以自己为中心、自己要作王、骄傲、离开本位想代替神）——这是人类堕落的根源。而神在耶稣里为我们预备的整个救恩、这整条321的路，要成就的，就是把我们从「旧人有己」的生命，改变成「新人无己」的生命：藉着福音真理，我们才能无己；无己，才能让耶稣在里面活、作王；无己，才能被圣灵引导；无己，才能合一、才能得胜、才能建立属神的体系、成就神的国。所以「灵悟命侍神」这条路，从头到尾都是「无己」的路——灵，是无己地让圣灵引导（不靠自己的聪明）；悟，是无己地让真理更新（不效法世界、不固守己见）；命，是无己地活出耶稣（不再是我，乃是基督）；侍，是无己地让耶稣作王（不是我服事，是基督在我里面服事）；神，是无己地让耶稣得荣耀（他必兴旺，我必衰微）。五个字，是无己生命的五个面向、一条动线。所以这最后一课的「灵悟命侍神」，不是一个新的、额外的东西，而是把你这170课所学的一切——三个基础、两个核心、一个目的，从心开始、改变观念、无己谦卑舍己、生命关系事工——全都收拢、贯穿、串成了一条你可以「从今天起、一生天天走」的路。它是整本《晨读321》的总纲，也是你往后一生的生命地图。"}},{"h":"二「命」与「侍」：生命的活出——效法耶稣与让祂作王","paras":["当我们有了「灵」与「悟」，接下来不是停在「知道」，而是进入「活出」——这就是「命」：耶稣是我的榜样。透过每天的看、听、想、讲、行，不断做一个选择——⟦b:舍己⟧。⟦g:当你一次一次选择舍己，你就一次一次活出无己的生命⟧。「命」不是模仿，是让耶稣活出来。","接着，就是「侍」：让耶稣作王。⟦b:服事不是我在做，而是耶稣在我里面做——我退下来，耶稣站上来⟧。⟦g:当耶稣作王，服事就有能力、有果效、有生命⟧。","⟦g:不是我活，乃是基督在我里面活；不是我在服事，是耶稣在服事；用心靠圣灵，不用脑靠自己⟧。"],"deeper":{"q":"想更深？走完整个第十单元（服侍），如果要把这一整个单元收拢成一句话带走，这条「灵悟命侍神」的服侍之路，到底要在我这个平凡人的一生里，活出什么？它跟我「每一天」的真实生活，有什么关系？","a":"走到第十单元的尾声，正好把这条「服侍之路」收拢成一句可以带走、可以天天活的话。先把整个单元走过的路浓缩一次：它开头重新定义了「服事」——服事不是在教会做事，而是「为主而活的整个生命」（157）；接着翻转了服事的动机——服事不是别人的需要，而是「我生命的需要与祝福」（158-159）；又拿掉了服事的门槛——不是够好才服事，而是「愿意的人都能，在服事中被神装备」（160）；然后给出了整条路的总纲与展开——「灵悟命侍神」：从圣灵起步（灵，162-163）、被真理更新（悟，164）、活出生命与舍己（命，165-166）、让耶稣作王地服事（侍，167）、传承生命（168）、最终让耶稣得一切荣耀、不见一人只见耶稣（神，169-170）。所以若用一句话收拢整个第十单元，那就是：「真正的服事，是一个无己的生命，从圣灵的源头流出，被真理更新、活出耶稣、让耶稣作王、传承生命，最终让耶稣得到一切的荣耀——服事不是我做事，是让基督的生命透过我流出去。」那这条路，跟你「每一天」的真实生活有什么关系？关系极深，因为「灵悟命侍神」从来不是一套只在教会、只在台上才用得到的理论，而是一条「每天、在最平凡的生活里」要走的路。让我们把它落到你的一天：清晨，当你醒来，第一件事不是急着靠自己安排、冲进忙碌，而是先回到「灵」——把这一天交给神，求圣灵充满你、引导你：「主啊，今天我不靠自己，只靠祢的灵。」这就是「灵」在你日常的活出。白天，当你读经、当你遇见一件事、一个难处、一个需要做的决定，你让神的话来「更新你的观念」，问「主，祢的真理怎么看这件事」，而不是照自己的老想法、世界的标准——这就是「悟」在你日常的活出。然后，在这一天无数个「看、听、想、讲、行」的选择里——被误解时选择饶恕而非反击、想为自己争时选择放下、想论断时选择怜悯、累了却有人需要时甘愿摆上——每一个「为主、为人、不为自己」的小选择，都是一次「舍己」，都是在「活出耶稣的生命」——这就是「命」在你日常的活出。而当你去服事、去爱人、去做你手中的工时，你不是靠自己硬撑、不是为了证明自己，而是把主权交给耶稣，让祂在你里面作王、靠祂的能力去做——这就是「侍」在你日常的活出。最后，无论这一天成功或失败、被看见或被忽略，你都在心里把一切交还给神：「主，这都是祢的恩典，荣耀归给祢，他必兴旺、我必衰微」——这就是「神」在你日常的活出。你看，「灵悟命侍神」不是五件遥远的大事，而是贯穿你「每一天、每一刻、每一个选择」的一条生命动线。它具体到——你今天早上靠谁起步？你今天怎么看待那件烦心的事？你今天在那个冲突里为自己还是为主？你今天做事是靠自己撑还是让耶稣作王？你今天把那份称赞或挫折，归给了自己还是神？这就是它跟你每一天的关系：它是你「平凡生活的得胜公式」，是你一生「不偏离、不枯干、不跌倒」的保守。而它的核心，始终是「无己」——每一天，在每一个环节，都是一次「放下自己、让基督」的选择。所以带走这一句吧：「灵悟命侍神，不是我要为神做的五件大事，而是我每一天靠圣灵起步、让真理更新、活出耶稣、让主作王、把荣耀归神的一条无己之路——是让基督的生命，一天又一天，透过我这个平凡人，活出来、流出去。」这条路，今天的你就能走；走上去，你就走在那位说「我就是道路」的主里面了。"}},{"h":"三「神」：生命的终点——一切荣耀归给神","paras":["最后的关键，是「神」：让耶稣得到一切的荣耀。⟦s:很多人走到「侍」就停了，却忽略了最后最重要的一步⟧。⟦s:如果没有「神」，就会骄傲、会抢夺荣耀、会跌倒⟧。","⟦g:但当一个人看见「一切都是恩典、一切都是神做的」，他就会自然活在谦卑中⟧。主耶稣的一生就是榜样——⟦b:祂极其谦卑，最终得到一切荣耀⟧。这也是我们的道路：⟦g:谦卑 → 被神高举⟧。","⟦g:不是我得荣耀，是耶稣得荣耀；焦点在耶稣，不在自己；无己的结果，就是神得荣耀⟧。"],"pq":"这条路，不是短跑，是马拉松；不是一时火热，是一生跟随。当你持续走在灵—悟—命—侍—神，你就越来越像耶稣，最终与主一同得胜、与主一同作王。","deeper":{"q":"想更深？走到《晨读321》全部171课的最后了。如果要把这「一整本书、一整趟旅程」收拢成一句话带走，这321的路，把我带到了哪里？接下来，我该怎么走下去？","a":"走到这里，是171课的终点，也是你一生道路的起点。让我们在这最后的时刻，把整趟旅程收拢，也为你接下来的路，立定方向。先回顾这趟我们一起走过的、完整的旅程。它从「呼召」开始：神呼召你「从巴比伦出来、迈进末后的大复兴、迎接主再来」，并让你看见——复兴的焦点，从头到尾，是耶稣（单元一）。接着祂为你立定根基：三个基础（耶稣是榜样、圣经是准则、圣灵是引导）、两个核心（让耶稣作王、让耶稣得荣耀）、一个目的（建立属神的体系）——这就是321（单元二、三）。然后，祂开始动工——从你的「心」开始，因为「一生的果效是由心发出」：教你用心靠圣灵、不用脑靠自己（单元四）；教你「改变观念就改变生命」，从人的观点转向神的观点（单元五）；带你进入整趟旅程的核心——看见「有己」是堕落的根源、骄傲是问题的根源，于是学习谦卑（单元六）、舍己（单元七），好让那「旧人有己」的生命，被改变成「新人无己」的生命。接着，祂培养这无己的生命——透过「看听想讲行」的更新，让真理成为生命、由内而外活出来（单元八，生命）；又让这成熟的生命流向关系，重整「与神、与己、与人、与事」的次序（单元九，关系）；最后，让这份爱与关系流出去，成为「服侍」——走在灵悟命侍神的路上，让耶稣作王、得一切的荣耀（单元十，服侍）。这就是整趟旅程：呼召 → 立根基（321）→ 从心开始、改变观念 → 无己（谦卑、舍己）→ 培养生命 → 流向关系 → 落实为服侍。那么，若用一句话收拢整本《晨读321》，它是什么？是这个：「神藉着福音真理，要把你从『旧人有己、以自己为中心、要自己作王』的生命，改变成『新人无己、让耶稣作王、让耶稣得一切荣耀』的生命；好让你不再活在失败里，而是反败为胜、成为得胜者，与许多同样被更新的生命一起，在地上建立属神的体系、神的国度，迈进末后的大复兴，迎接主耶稣再来。」一句话再浓缩：「无己，让耶稣作王，让耶稣得到一切的荣耀，建立属神的体系。」——这就是321，这就是这171课要在你生命里成就的。那321的路，把你带到了哪里？它把你带到了一个全新的起点：一个「看见自己的问题（有己、骄傲），也看见上帝的恩典（耶稣的死解决罪、耶稣的复活赐下新生命）」的起点；一个「不再靠自己、而是靠圣灵，不再为自己、而是为耶稣」的起点；一个「焦点不在自己、不在别人、不在环境，单单在耶稣」的起点。但要记得——这只是「起点」，不是「终点」。171课的结束，不是「毕业」，而是「上路」。因为「灵悟命侍神」是一条「一生的道路、不断的循环」，是马拉松，不是短跑。所以接下来，你该怎么走下去？第一，「天天走这条路」。不要把这171课当成「读完了、结束了」的一本书，而要把它当成「一生天天要走的路」。每天从「灵」开始（靠圣灵）、用「悟」更新（让真理改变观念）、在「命」中舍己（活出耶稣）、在「侍」中让主作王（服事）、以「神」收尾（荣耀归神）。改变，从来不是读完就完成，而是「渐渐更新」、一生之久的同行。第二，「操练920、发展235」。不要只是自己属灵就好——把每一个与你有关系的人当作你的「2」，活出无己（0）、结出圣灵的果子（9）；与没有问题的人成为属灵同伴（2）、建立属灵父母儿女的关系（3）、成为属灵战友五重职分的团队（5）。让生命流向关系、流向传承，这才是321的目的——不是一个孤立完美的「我」，而是一张被神的爱重新连结的「关系的网」、一个彼此相爱的「属神的群体」。第三，「陪伴人，成为得胜者」。你被神更新，是为了去更新别人；你被陪伴，是为了去陪伴别人。从你身边那一个人开始，带他、陪他、放他，让基督的生命一代一代传承下去，一起在地上建立神国的领域，直到主耶稣再来。第四，也是最要紧的——「持续无己，让耶稣作王、得荣耀」。这条路会有软弱、会有跌倒、会有反覆，但别灰心：那位「在你们心里动了善工的，必成全这工，直到耶稣基督的日子」（腓1:6）。你的盼望，从来不在你做得多好，而在「祂必成全」。所以，亲爱的弟兄姊妹，《晨读321》的171课在这里画下句点，但你与主同行的生命之路，正要展开。愿你一生走在「灵—悟—命—侍—神」这条道路上，不偏离、不枯干、不跌倒；愿你旧人有己的生命，真实地成为新人无己的生命；愿你失败的人生，真实地反败为胜，成为得胜者；愿你与许多被更新的生命，一起建立属神的体系、迈进末后的大复兴、迎接主耶稣再来。到那日，你必与主一同得胜、与主一同作王，在神的国里，与基督同坐宝座，直到永远。这不是结束，是开始。起来，走上去——因为那说「我就是道路」的主，已经在这条路上，与你同行。一切荣耀，都归给祂。阿们。"}}],"focus":"《晨读321》走到了最后一课。\n但「灵—悟—命—侍—神」\n这条一生的道路，\n才正要开始。\n从今天起，\n我愿不愿意，天天走在其上？","hope":{"t":"✺ 这不是结束，是你一生道路的开始","paras":["走完171课，你或许以为这是一段旅程的「结束」。但这一课要对你说：⟦b:这不是结束，是开始⟧。「灵—悟—命—侍—神」不是五个读完就过去的阶段，而是一条「一生天天要走、不断循环」的生命之路——是马拉松，不是短跑；是一生跟随，不是一时火热。","⟦g:当你持续走在这条路上，你会越来越被圣灵充满、越来越明白真理、越来越活出生命、越来越流露爱、越来越将荣耀归给神⟧。到最后你会发现——不是你在为神做事，而是神在你里面，活出祂的生命。愿你旧人有己的生命，成为新人无己的生命；愿你失败的人生，反败为胜，成为得胜者。起来，走上去吧——因为那位说「我就是道路」的主，已经在这条路上，与你同行，直到祂再来的日子。一切荣耀，都归给祂。"]},"still":"此刻安静——\n回顾这171课，\n神在我生命里，\n最深地动了哪一处？\n而从今天起，\n祂邀请我，踏上这条一生的道路。","still_hint":"不必急着总结，只要回应。\n安静一分钟，\n把你的一生，交给主：\n「主啊，我愿意一生走在\n灵—悟—命—侍—神的路上，直到见祢面。」","steps":[{"act":"每天从「灵」开始、用「悟」更新：每天问——今天我是跟随圣灵，还是跟随自己？并透过神的话修正思想、更新观念、对齐真理，不让旧观念主导人生。","meta":""},{"act":"每天在「看听想讲行」中舍己、让耶稣作王：刻意选择不为自己、为耶稣、为别人；服事时不问「我要怎么做」，而问「主，祢要怎么做？」把主权交给耶稣。","meta":""},{"act":"每天把一切荣耀归给神、并传承生命：无论成败都宣告「一切都是恩典、荣耀归神」；并从身边一个人开始，带他、陪他、放他，让生命一代一代传承。","meta":""}],"declare":"主耶稣，我愿意一生走在祢的道路上。\n我宣告：\n我选择体贴圣灵，活出生命；\n我选择对齐真理，更新观念；\n我选择效法耶稣，活出无己；\n我选择让主作王，带出服事；\n我选择将一切荣耀归给神！\n我要一生走在「灵悟命侍神」的道路上，直到见祢面的日子！\n奉主耶稣的名，阿们。","share":[{"tag":"领受","q":"走完整本《晨读321》171课——如果要用一句话，说出神在你这段旅程中，为你成就最大的一件事，那会是什么？"},{"tag":"省察","q":"「灵—悟—命—侍—神」这五个字，目前哪一个字是你最自然、已经在走的？哪一个字是你最需要从今天起，刻意操练、走下去的？"},{"tag":"同行","q":"这是171课的终点，也是一生道路的起点。请每位家人分享：从今天起，你要如何「天天」走在这条路上？并彼此立约、彼此守望，一起走下去、一起成为得胜者，直到主再来。"}],"next":"","prog":"100"}]</script>
<script type="application/json" id="book-json">[{"n":0,"num":"Ⅷ","title":"复兴的实际—建立关系","verse":"祂回答：「你要全心、全性、全意爱主你的上帝。这是最重要的第一条诫命。第二条也和它相似，就是要爱人如己。」（新译本，太22:37-39）","verse_ref":"","blocks":[{"t":"p","x":"复兴不是一个口号，复兴是实际的！复兴是可见的、是可行的、可冲量的！"},{"t":"p","x":"**复兴是可见的**：复兴是肉眼可见的，从个人生命的改变开始，进而生命影响生命，繁殖生命，影响社会和国家。"},{"t":"p","x":"**复兴是可行的**：复兴是可以做到的，人得到耶稣的生命后，运用「培养白狗，饿死黑狗」的策略，借着反覆操练五个基本功「看、听、想、讲、行」来培养属灵的生命。"},{"t":"p","x":"**复兴可衡量的**：复兴是可衡量的，如何知道我们是否有选择正确的「看、听、想、讲、行」？其准则就是建立关系。能建立关系的「看、听、想、讲、行」就是正确的选择！为何？在这个单元中，我们将会探讨并解释这个问题。"},{"t":"h","x":"上帝的旨意"},{"t":"h","x":"遵行上帝旨意的重要性"},{"t":"p","x":"圣经从始至终，都强调遵行上帝旨意的重要性。在任何一个时期，无论是创世的时候[^1]、始祖时期[^2]、旷野的时期[^3]、迦南美地[^4]、列王时期[^5]、漂流时期[^6]、甚至在耶稣的时代[^7]，上帝都重覆着同样的要求，就是要我们遵行上帝的旨意。为什么上帝那么看重遵行祂的旨意呢？「这世界和其上的情欲都要过去，惟独遵行神旨意的，是永远常存」[^8]。这世界唯一能常存的，就是遵行上帝的旨意。世上所做所得的，有一天都会转眼成空。若要生命有人生的价值在于："},{"t":"p","x":"一、活在上帝的旨意"},{"t":"p","x":"二、死在上帝的旨意"},{"t":"p","x":"三、传承上帝的旨意"},{"t":"p","x":"价值，就必须遵行上帝的旨意。"},{"t":"p","x":"遵行上帝的旨意有不同的阶段。我们不单要「活在上帝的旨意」，「死在上帝的旨意」，更是要「传承上帝的旨意」。**「活在上帝的旨意」**是遵行上帝旨意的起步，常会面对困难和挑战。若没有「死在上帝的旨意」，也就是坚持到底的心志，就很容易半途放弃上帝的旨意。"},{"t":"p","x":"**「死在上帝的旨意」**就是抱着一个不怕死的心志、毫无保留地遵行上帝的旨意。让生命变得更有价值的就是**「传承上帝的旨意」**，就是帮助别人也能「活在上帝的旨意」并「死在上帝的旨意」，如此我们的生命就带来影响力。摩西的生命就是如此，他不单自己遵行上帝的旨意，也传承上帝的旨意给约书亚，让以色列人能出埃及，进迦南，脱离被奴役的人生。「传承上帝的旨意」也是耶稣的榜样[^9]，耶稣凡事都照着上帝的旨意而行，坚持遵行上帝的旨意，直到付上生命的代价，「死在上帝的旨意」中。祂的生命影响了门徒们，在耶稣升天后，门徒们都甘心「活在上帝的旨意」、「死在上帝的旨意」，并继续「传承上帝的旨意」，福音就被传开，并延续到如今！"},{"t":"p","x":"遵行上帝的旨意，不单使我们的生命有价值，也是我们属灵生命成长的关键。「我的食物就是遵行差我来者的旨意，作成祂的工」[^10]。我们属灵生命的食物就在于正确的行，那就是遵行上帝的旨意，并做成上帝的工。"},{"t":"h","x":"什么是上帝的旨意？"},{"t":"p","x":"那，什么是上帝的旨意呢？上帝的旨意并不是深不可测的，也不需要经过很长时间祷告才能明白。上帝不会向我们隐藏祂的旨意，上帝从古至今都很愿意向我们显明祂的旨意。在旧约，上帝借着摩西把祂的旨意教训祂的百姓，使他们遵守并得福。如今，上帝仍然借着圣经，把祂的旨意向我们说明，使我们「既从律法中受了教训，就晓得神的旨意，也能分别是非」[^11]，可见上帝的旨意是显明的，要让我们知道并在凡事上遵行祂的旨意。"},{"t":"p","x":"既然上帝借着圣经说明祂的旨意，那圣经中最主要的教训是什么呢？耶稣的回答是：「你要尽心、尽性、尽意爱主你的神。这是诫命中的第一，且是最大的。其次也相仿，就是要爱人如己。这两条诫命是律法和先知一切道理的总纲」[^12]，也就是说圣经中所有的诫命可以归纳为这两个诫命，就是要爱上帝，并且爱人如己。耶稣也给了我们一条新命令：「我赐给你们一条新命令，乃是叫你们彼此相爱；我怎样爱你们，你们也要怎样相爱」[^13]。这个命令是指着门徒们要彼此相爱，也就是要爱教会！我们不难发现，这三个命令有一个共同元素，那就是「爱」：爱上帝、爱人及爱教会。**在上帝所有的命令中，最重要的就是「爱」**，因此遵行上帝的命令，就是要在「爱」里[^14]。没有爱的遵行，即使我们做出极大的牺牲，也是徒然的[^15]。"},{"t":"p","x":"爱是如此重要！那我们怎么知道自己是否有「爱」呢？**衡量「爱」的方式就是建立关系**。如何衡量我们是否爱上帝，或彼此相爱呢？就是我们是否与上帝建立关系？是否建立与彼此的关系。上帝吩咐我们「爱上帝」和「爱人」的目的，就是要建立关系，上帝「爱」我们，把祂所爱的独生子耶稣赐下，为我们舍命，为使我们借着耶稣，恢复与上帝的关系，成为上帝的儿子[^16]。耶稣因为「爱」，愿意舍去生命来建立上帝与人的关系，因此衡量是否是上帝旨意，关键就在于所行的是否能建立关系。"},{"t":"p","x":"建立关系是上帝的旨意，从创世以来，就看重与人的关系：把人安置在伊甸园，常与人同在[^17]；而隔离是撒旦的心意，它的工作就是要破坏关系[^18]。当人听从撒旦的话后，就开始与上帝隔离，不敢见上帝的面。人与人之间的关系也受到破坏，人开始推卸责任，甚至人与事物的关系也受到破坏，地受到咒诅，并开始长荆棘和蒺藜。然而，上帝的旨意并没有改变，祂仍然渴望与人建立关系。借着祂的作为和律法，要与人建立关系，并反覆地提醒人：「我要作你们的神，你们要作我的子民」[^19]。后来更借着耶稣的死，洗净我们的罪[^20]，藉圣灵常住在我们的心里[^21]，以上这些都表明上帝要和我们恢复，并建立关系的渴望。"},{"t":"p","x":"上帝看重关系，祂也渴望我们能重视关系！除了吩咐我们爱上帝、爱人如己，及彼此相爱之外，其他吩咐也多半都与建立关系有关。比如耶稣给门徒的大使命，就是要去使万民作主的门徒。显然的，若要达成这个使命，就必须与人建立关系，并帮助他人与上帝建立关系。另外，耶稣也多次提醒我们要饶恕人，就必得到天父的饶恕[^22]，这个「要饶恕人」的吩咐，不单要恢复与人的关系，同时也直接影响我们与上帝的关系，因此，上帝旨意的中心就是建立关系。我们所做的事若能带来关系的建立，那就是上帝的旨意。"},{"t":"h","x":"关系的次序"},{"t":"p","x":"不是所有关系的建立，都是上帝的旨意。我们必须对建立关系的次序有正确的了解，因为离开了关系次序而建立的关系，不是上帝的旨意！关系有不同的次序：先是与上帝的关系，与自己的关系，与他人的关系，最后是与事物的关系。**最优先的次序是建立与上帝的关系！**任何破坏了我们与上帝的其他关系，就不是上帝的旨意；比如婚外情，有妇之夫若与妻子以外的女人建立关系，这样的关系，不单会破坏与妻子的关系，也会破坏与上帝及与自己的关系，这关系的建立就不是上帝的旨意！"},{"t":"p","x":"颠倒了建立关系的次序，便是离开了上帝的旨意，破坏了原本上帝所造和谐的关系，例如当我们把与事物的关系，放在其他关系之上，就是所谓的「对事不对人」，就会因着注重事物，而破坏了前三种关系，这不是上帝的旨意。正如扫罗的献祭，因着要在作战前先献祭（与事的关系），及留住百姓（与人的关系），没有等撒母耳的来到就私自献祭，破坏了与上帝的关系，被撒母耳责备[^23]。之后又因着怜惜牛羊（与事的关系），没有听从上帝的吩咐把牛羊灭绝，这样的行动被形容为厌弃耶和华的命令，破坏了扫罗与上帝的关系。一个看来是好的行动，若是破坏了我们与上帝的关系，就不是上帝的旨意，因此撒母耳说：「……听命胜于献祭；顺从胜于公羊的脂油」[^24]，表达了上帝看重人与祂的关系，过其他一切。"},{"t":"p","x":"关系的次序："},{"t":"p","x":"一、与上帝的关系"},{"t":"p","x":"二、与自己的关系"},{"t":"p","x":"三、与他人的关系"},{"t":"p","x":"四、与事物的关系"},{"t":"p","x":"上帝常提醒我们：要把与祂的关系放在为祂所做的事之上！上帝渴望的是我们与祂之间互动的关系，就是愿意听从、顺服祂，这样的关系，胜过我们所献的事奉。我们不要让与事的关系，包括属灵的事奉，超越了我与上帝和与人的关系，否则就会损坏与上帝，与人，与自己的关系，这也是许多人在事奉中感到压力烦恼，甚至灰心丧志的原因，因此我们必须认清，并调整建立关系的正确次序。"},{"t":"h","x":"一、与上帝的关系"},{"t":"p","x":"世上唯一能持续到永恒的关系，就是与上帝的关系！启示录中，末后在天上剩下的关系，就是人与上帝的关系[^25]，这个关系不单最持久，也是我们人生中最重要的关系。耶稣来到世界拯救我们，叫我们不至灭亡，反得永生[^26]，这永生不是指着长生不老或永远不死，而是指能建立与上帝的关系：「认识你独一的真神，并且认识你所差来的耶稣基督，这就是永生」[^27]，能认识上帝并耶稣，就是永生。可见，「与上帝的关系」是人生中最重要的关系！"},{"t":"p","x":"永生不是指信主的那个时刻，也不是等到死了才能拥有的；耶稣所提到的永生，是认识上帝并耶稣，是一个从现在持续到永恒的过程。更多认识上帝，就能更多相信祂，这个**与上帝之间的关系，就是永生**。世上不论是与自己、与他人或是与事物的关系，都是为了让我们能更认识上帝，使我们建立与上帝的关系。在人生的不同遭遇中所面对的人或事，都让我们经历上帝并更认识祂[^28]，保罗也渴望竭力追求更认识基督[^29]。特别是在苦难中，我们更能认识上帝[^30]并明白上帝的话[^31]，因此在面对苦难时，更应该感恩及欢喜，因为是我们认识上帝的机会，是有意义和价值的。其实不单在苦难中，在任何环境中，我们都可以问上帝：「祢在这当中要告诉我什么？」。上帝必显明祂的心意，帮助我们更认识祂，建立更深的关系。"},{"t":"p","x":"建立与上帝的关系是最优先的，是所有关系的基础。「我们爱，因为神先爱我们」[^32]：只有借着认识上帝的爱，我们才能去爱，去经营和建立其他层面的关系。"},{"t":"h","x":"二、与自己的关系"},{"t":"p","x":"大诫命的第一条是要爱上帝，其次是要爱人如己[^33]。「爱上帝」说明与上帝的关系是首要的，而「爱人如己」则提醒我们必须先学会爱自己，然后才有办法去爱人。人若不了解上帝对我们的爱，就不懂得爱自己[^34]，也不懂得如何爱别人。只有认识耶稣无条件的接纳我们，我们才能无条件的接纳自己，并无条件的接纳别人；换句话说，我们必须与上帝有良好的关系，才能与自己有良好的关系，与自己有了良好的关系，才能与别人建立良好的关系。"},{"t":"p","x":"什么是与自己有良好的关系？就是内外一致，用「信心」与「行为」，把与上帝的关系表现出来：「只是你们要行道，不要单单听道，自己欺哄自己」[^35]。自己欺哄自己就是与自己没有良好的关系，常有内在冲突，活得很痛苦，不开心，正如说谎的人一般。我们心里所信的、思想所想的、口中所说的，若与行动一致，就代表我们与自己有良好的关系，这样我们就活得很开心！因此**衡量我们与自己的关系是否良好，就是看我们是否开心。**信心与行为一致的人，就能开心，这样的人就是与自己有良好的关系。"},{"t":"p","x":"保罗曾经历这段内在挣扎的过程[^36]，就是他所愿意的善，他反不做；所不愿意的恶，他倒去做。这是很痛苦的内在挣扎！在罪中挣扎的人，常会有类似的感受：暂时的快乐换来长期的痛苦。保罗如何战胜这样的挣扎呢？着耶稣就能！先建立与上帝的关系！借着耶稣的生命和圣灵的帮助[^37]，我们才有能力行出上帝的话。当我们信心与行为一致，与自己的关系就得建立，我们就能开心，就能建立与别人的关系。当大家都与自己有良好的关系，大家都开心，教会必定复兴！"},{"t":"h","x":"三、与他人的关系"},{"t":"p","x":"我们能彼此相爱，是因为拥有上帝的爱[^38]。与上帝的关系是建立与他人关系的基础，也是我们与上帝关系的表现。圣经记着：「人若说『我爱神』，却恨他的弟兄，就是说谎话的；不爱他所看见的弟兄，就不能爱没有看见的神」[^39]。爱上帝，就当爱所看得见的弟兄姐妹。若我们彼此相爱，别人就能看出我们与上帝的关系[^40]。与他人的关系不单是指着爱弟兄姐妹，也包括要爱仇敌。耶稣说若能爱仇敌，就能作天父的儿子[^41]。若我们没办法与人建立关系，那就先调整与上帝及与自己的关系，使我们有能力去爱他人。"},{"t":"p","x":"与他人建立关系的目的，不是为了让人喜欢我们，也不是为了得到回报，**与他人建立关系的目的，是为了传承**，使人作耶稣的门徒，建立与上帝的关系。上帝的计划，需要下一代与上一代的人合作才能完成，祂不要我们成为独行侠，祂要我们与人建立关系，使我们能一起完成上帝的计划。这样的传承使我们的生命变得更有价值，生命的价值不断延续，大家一起完成上帝的计划。"},{"t":"p","x":"圣经中列出不少两代合作，传承的例子：上帝借着摩西带领以色列人出埃及，却透过约书亚带领他们进入迦南、得地为业[^42]。上帝借着大卫的渴望，预备了材料，让其子所罗门把圣殿建成[^43]。上帝借着以利亚挑战亚哈王和耶洗别，却借着亚兰王哈薛，耶户和以利沙，把他们除掉[^44]。借着养父末底改的鼓励和劝诫，以斯帖觉悟并鼓起勇气向王求情，解救族人脱离灭族的危机，并反败为胜[^45]。耶稣也透过这个模式来完成上帝救赎的计划。祂用三十三年半的时间，给门徒立下榜样，在十字架上完成救赎的工作，接着吩咐并差遣门徒，把福音传遍全地[^46]。"},{"t":"p","x":"可惜的是，现今许多教会中，上一代与下一代之间，往往互相敌对、互不了解，造成教会极大的损失。我们必须认清传承的重要性：**青年人的活力，加上老年人的智慧，就能成就更伟大的事！**若要达成，老年人就需要给青年人发挥潜能，及犯错的空间，而青年人需要聆听，并尊重老年人的建议，也就是建立良好的关系，上一代培养下一代成为耶稣的门徒，教会就能持续发展，而且一代比一代更好。不只是建立与下一代的关系，更是帮助下一代建立与他人的关系，传承就能持续下去！人人都遵行上帝的旨意，末后的复兴很快就要来临了！"},{"t":"p","x":"建立与他人的关系，不单是指个人的层面，也指着不同群体之间，包括教会与教会的关系。若要看见末后的大复兴，教会与教会之间，必须建立关系，关系有多深，配搭就能多深！只有当教会互相联结，上帝的国度才能建立起来，撒旦的国就会被击败。在第二册「复兴的异象—国度教会」这个单元中，我们将更深入的探讨上帝国度的重要性。"},{"t":"h","x":"四、与事的关系"},{"t":"p","x":"圣经常常把我们与事情的关系形容为「管家」，对管家的要求就是要忠心[^47]。上帝不以事情的成效，而是以我们对事情的忠心来衡量我们[^48]。不论是大事还是小事，上帝对我们的要求都是一样的[^49]！对忠心的人，上帝就托付更大的事；对不忠心的人，他所有的都会被夺去。保罗劝提摩太，要把上帝的道交托那些能忠心教导别人的人[^50]。可见，在事上忠心是上帝要求的素质。"},{"t":"p","x":"上帝曾如此说：「我要为自己立一个忠心的祭司；他必照我的心意而行」[^51]。这是上帝对撒母耳的形容，因为他照上帝的心意行。如此看来，忠心不单是坚持到底、由始至终的做事，更是要在所做的事上，按着上帝的心意而行。若与上帝没有良好的关系，我们就不明白上帝的心意，就无法忠心。**忠心的基础是建立在与上帝的关系**，是在与上帝、与自己及与他人的关系中做事。忠心的管家建立关系，而不破坏关系，因为上帝看重建立关系，胜过事情的成效。"},{"t":"p","x":"**人对，事就对；人错，事就错。**所谓的「人对」是指人与上帝、与自己、与别人有良好的关系，当人在各方面建立了良好的关系，所做的事才会合上帝心意！耶稣在吩咐彼得喂养他的羊前（做事），先确定彼得的关系次序是正确的（「你爱我吗？」[^52]）。上帝在要求我们在服侍祂之前，先确定是因爱祂而做，也就是我们与上帝建立良好的关系。不要急着把事情完成而忽略了关系，不是我们不看重做事，而是上帝旨意的中心是建立关系，因此若所做的事能建立与上帝、与自己、与别人的关系[^53]，就是合上帝心意的事，就是有价值的事情！"},{"t":"p","x":"回顾耶稣对待彼得的例子，我们就会发现：耶稣看重关系过于事情。虽然彼得三次否认耶稣，又带门徒回去打鱼，耶稣并没有因为这些事而责备彼得。耶稣看重与彼得的关系，喂饱门徒，重新给彼得回应的机会。耶稣看重与彼得的关系，胜于他所做的事，就得回彼得的心。当彼得重新表明对耶稣的爱，之后为耶稣所做的事，远远超过他之前所做过的事[^54]，一个怕死的彼得，变成了愿意为耶稣而死的彼得[^55]！因此，看重关系不表示什么事都不做，而是把和人的关系放在事情之上。先有了对的人，做的事情就会对！"},{"t":"h","x":"重整次序：解决问题还是建立关系？"},{"t":"p","x":"建立关系的次序非常重要。有句话说：**「有关系就没关系；没关系就有关系」**，意思是若我们建立关系的次序是正确的，做起事来就没问题。人若与上帝有良好的关系，明白上帝的心意，被上帝推动，就必**「甘心」地做**。人若与自己有良好的关系，他能自己推动自己，就必**「开心」地做**。人若与他人有良好的关系，能与他人有互动，能**「同心」地做**。"},{"t":"p","x":"「对事不对人」本意是想公正地处理事情，反而因为重点放在事情，忽略了其他，以致「因事伤到人」！关系的优先次序一旦被颠倒，例如与事的关系被放在其他关系之前，往往会破坏其他关系。一旦关系不好，人就无法甘心、开心、同心地做事，事情就很难做得持久。在教会中，我们也常犯这个毛病，把与事的关系放在其他关系之上，还以此要求他人，这导致大家在服事上帝的路上越来越无力、越来越不开心，服事的人越来越少，而且需要消耗很多时间和精力，才能重新得力！"},{"t":"p","x":"重整关系的次序，事情做得更好："},{"t":"p","x":"一、与上帝的关系—上帝推动—甘心"},{"t":"p","x":"二、与自己的关系—自己推动—开心"},{"t":"p","x":"三、与他人的关系—互动—同心"},{"t":"p","x":"既知建立关系的次序如此重要，为什么我们还会把关系的次序颠倒呢？有两个主要的原因：第一个原因是不愿付代价：建立关系需要付上代价，不单是时间，还包括精力、祷告、陪伴、鼓励，坚持和忍耐等，且不容易看见果效。相比之下，解决问题则可以很快借着规条和纪律来处理，短期内也容易看见果效！但是，我们若注重解决事情，没有「先」了解人，给人缓和的空间，而以条规和纪律的强压方式处理，问题看来是解决了，但很可能因此失去人心！若以建立关系的方式来处理，把建立关系放在解决问题之上，就需要付上较长的时间，和更多的代价，才能得到人心，帮助人恢复正确的关系次序，当他成为对的人，所做的事才会有价值！正如耶稣付上代价，和我们建立关系，使我们称义并成圣[^56]。"},{"t":"p","x":"另一个使建立关系的次序颠倒的原因，就是「时间」和「成绩」，因为建立与事的关系能在最短的时间看见成绩，而且很容易衡量。相比之下，建立关系需要比较长的时间，而且不容易衡量成就。若我们站在功利的角度，看重立即的效果和较短的时间，就很容易把关系的次序颠倒！颠倒了建立关系次序的结果，导致我们需要付上更大的代价、更久的时间，才能纠正过来，因此若要重整建立关系的次序，我们必须把目光放在上帝的旨意，认清生命的价值，就是建立关系，建立人成为耶稣的门徒[^57]。"},{"t":"p","x":"如何知道我们把建立关系的次序摆对呢？其中一个帮助自我反省的问题是：我看重「解决问题」或「建立关系」？若答案是「解决问题」，那么我们就是把事情放在建立关系之上。反之，就是把建立关系放在事情之上。让我们拿几个在教会中常见的事做例子："},{"t":"h","x":"重整次序例子（一）：祷告"},{"t":"p","x":"祷告的目的是为了什么？是为了解决问题，还是为了建立关系？若祷告是为了解决问题，人就在有需要的时候才祷告，要上帝解决问题，期待上帝行神迹，我们在祷告中就只认识神迹；若祷告是为了和上帝建立关系，我们就在祷告中认识上帝。耶稣教导门徒祷告的第一句话：「我们在天上的父」[^58]，清楚地表达了在还没告诉上帝需要和问题前，最优先的次序，是认清上帝是我们的天父，祷告是与上帝建立关系！"},{"t":"p","x":"祷告若是为了要上帝解决问题，我们期待上帝改变环境、行神迹，我们的信心是建立在环境和神迹，而非上帝。这种认识神迹的信心，并不能持久，正如以色列人经历了红海的神迹后，他们的信心只维持了三天！一面对水苦的问题，他们就开始埋怨上帝[^59]；上帝不断解决以色列人的问题，但以色列人并没有因此认识上帝，反而因不信而死在旷野里[^60]。特别在士师记中，我们发现，以色列人都是在面对问题的时候才向上帝呼求，要上帝搭救、解决问题。问题一旦解决了，他们就忘了上帝，直到面对另个问题，他们才再次呼求上帝。祷告若是要上帝解决问题，就有解决不完的问题，活在解决问题的循环中！"},{"t":"p","x":"祷告是为了建立与上帝的关系，让上帝调整我们的心，使我们能认识上帝的心意。摩西每次到上帝面前，就是带着能认识上帝的期待：在旷野的日子，摩西越来越认识上帝，面对面与上帝说话；在他人生的后期，他向上帝求的，不是要上帝解决问题，而是要认识上帝的荣耀[^61]！祷告若是为了建立与上帝的关系，那么问题有没有得解决，我们的信心都能因更认识上帝而增加！保罗也有这样的心志，不论环境如何、问题有多艰难，都不能影响他建立与上帝的关系，他说：「……都不能叫我们与神的爱隔绝」[^62]！若祷告不是为了解决问题，而是建立与上帝的关系，那么问题就不再是问题了！"},{"t":"h","x":"重整次序例子（二）：纪律"},{"t":"p","x":"当人犯错的时候，我们采用纪律，其目的是什么呢？人常常用纪律来解决问题，来警戒人，解决犯错的问题，要求犯错的人：「你自己改变」！这是抱着惩罚的目的来采用纪律，接受纪律的人所感受到的，往往是被拒绝，被要求，很可能没有勇气和能力再站起来，或是短期内可以看见成效及可衡量，但日久失人心，一旦对方反弹，就需要更强烈的纪律来压制！若我们把与事的关系，放在其他的关系之上，就会注重事而失去人。渐渐地，我们会发现在身边的人才越来越少。"},{"t":"p","x":"若我们回到建立关系的正确次序，**先注重人，就能挽回人！**这是抱着爱，恢复对方的心态而使用纪律，我们用纪律来帮助犯错的人建立与上帝、与自己、与他人的关系。这需要付上较大的代价，不是在要求犯错的人「你自己改变」，而是选择陪伴犯错的人，走过改变的过程，就是「我陪你改变」。这样的纪律方式，也许不会即刻看到效果，但却会使接受纪律的人，感受到被接纳，有能力再次站立起来，并更好地成长。"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"| --- | --- | --- |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"|  |  |  |"},{"t":"p","x":"| 纪律 | 解决问题 | 建立关系 |"},{"t":"p","x":"| --- | --- | --- |"},{"t":"p","x":"| 目的 | 惩罚人 | 恢复人 |"},{"t":"p","x":"| 态度 | 拒绝 | 接纳 |"},{"t":"p","x":"| 方式 | 你自己改变 | 我陪你改变 |"},{"t":"p","x":"| 效果 | 注重事， 失去人 | 注重事， 挽回人 |"},{"t":"p","x":"「我陪你改变」的纪律方式，需要有父母对待孩子的心态，也是上帝对我们的心态。圣经形容上帝对我们的纪律为「管教」[^63]，管教的前提是关系，是**父子爱的关系**[^64]，动机是为了爱孩子，希望能得回孩子[^65]。正如上帝视我们为祂的儿女，在我们犯错的时候，要得回我们而管教我们。"},{"t":"p","x":"当亚当违背上帝的命令，吃了分辨善恶的果子后，上帝没有放任亚当，祂主动寻到亚当，第一个问题不是问：「你做了什么事？」，而是问「你在哪里？」[^66]。上帝注重亚当这个人，过于他所做的错事，虽然他们必须承担犯罪的后果，然而上帝的目的不是要惩罚他们，上帝的宣判不是绝望，而是带着救赎的应许[^67]，要恢复人与上帝之间的关系，地位和权柄。在宣判后，上帝即刻给他们用皮子做衣服遮羞[^68]。又怕他们摘了生命树的果子吃，就永远带罪活着，便将他们赶出伊甸园，目的不是拒绝，而是要保护他们。上帝这些纪律的行动，表明上帝注重与亚当和夏娃的关系，愿意花时间把他们挽回过来，而不是急于纠正他们所犯的错！"},{"t":"p","x":"在面对跌倒中的人时，我们是否像上帝那样注重人呢？我们是向跌倒的人「丢石头」还是「丢绳子」呢？我们的反应和纪律方式，是把人打死，还是在帮助人站起来呢？圣经教导我们，要以温柔的心把跌入罪中的人挽回[^69]，上帝虽然憎恨罪，但祂却愿意爱世上的罪人[^70]，上帝对我们有怜悯、有恩典，「祂没有按我们的罪过待我们，也没有照我们的罪孽报应我们」，还常常向我们显慈爱[^71]。上帝不要我们定人的罪，而是要我们尽力将人挽回。让我们**开始培养「丢绳子」，送「补品」的文化，而不是「丢石头」，投喂「毒品」的文化**，让我们建立正确的关系次序：重视人过于事情，不以惩罚，而是以爱和接纳来陪伴人成长！"},{"t":"p","x":"虽然上帝注重人，以恢复为目的而施行管教，但不是所有经过纪律的人都能挽回！我们必须认清「恶人」（wicked）与「软弱的人」（Weak）的分别：上帝扶持软弱的人，但却除灭恶人[^72]！软弱的人，无论所犯的错或罪有多大，只要人愿意谦卑悔改，上帝就必赦免[^73]。而恶人就不同了，常常与骄傲的人，或不敬畏上帝的人相提并论[^74]，常常伤害别人[^75]。上帝憎恶恶人[^76]，阻挡骄傲的人[^77]，称绊倒人的人是有祸的[^78]。若是恶人不愿悔改，并造成上帝身体的死亡时，就必将他剪除[^79]。耶稣教导我们：面对得罪我们的人时，要先以「建立关系」为前提，私下去和好，倘若那人不愿悔改，也不接受教会的劝导，最终就把他看作外邦人[^80]，尤其要把淫乱的人交给撒旦[^81]，使他的灵魂在主的日子可以得救！由此可知，同样是接受纪律管教，但我们对软弱的人要扶持，对恶人要剪除！"},{"t":"p","x":"我们可从日常生活中的选择和反应，看出我们看重解决问题还是建立关系。在个人的生活中、在家庭中、工作场所，甚至在服事中，我们如何决定呢？，如何「看、听、想、讲、行」呢？问问自己：「这样的选择，是建立关系，还是会带来关系的破坏」？若是会破坏关系，带来隔离，这往往是撒旦的工作。上帝旨意的中心是建立关系，任何行动和决定，都必须是为了建立关系，而且需要回到关系的正确次序，先是与上帝、然后是与自己、与他人的关系，最后才是与事的关系。若发现我们错了，就改；若是跌倒了，就再站起来！若我们常常这样做，我们会看见复兴来临，听起来容易，做起来更容易！"},{"t":"p","x":"1"}],"fns":{"1":"创3章：夏娃听蛇的话、亚当听妻子的话，而他们都没有听从上帝的话就受到咒诅。","2":"创12章：亚伯拉罕听从上帝的话而承受应许；创22章：亚伯拉罕遵行上帝的吩咐献以撒而得福。","3":"出19:5；申5章，28章等：上帝反覆提醒以色列人要遵守祂话就必做上帝的子民。","4":"书1:7：上帝要约书亚遵守祂的吩咐就必顺利；约书亚记：以色列人遵照上帝的吩咐作战就打胜战。","5":"撒上13:14，15:22-23：上帝对君王的要求就是要遵守上帝的吩咐","6":"结11:20，37章；亚3:7等：借着先知们不断劝以色列人要回转并遵行上帝的吩咐。","7":"太5:19：遵行上帝旨意在天国是最大的；太12:50：遵行上帝旨意是耶稣的家人；约15:14：遵行上帝旨意是耶稣的朋友。","8":"约壹2:17","9":"约12:24-26：耶稣不单自己把命给我们，祂要我们也跟从祂的榜样。","10":"约4:34","11":"罗2:18","12":"太22:37-40","13":"约13:34","14":"约15:10","15":"林前13:1-3","16":"弗1:4-10，借着耶稣基督和祂的血使我们得到儿子的名分。","17":"创2:15-23，上帝与人同在，除了对人说话，也与人互动，包括把动物带到人面前、甚至为人预备配偶。","18":"创3:9-24，人听从撒旦的话后，开始躲避上帝，又彼此推卸责任，并且受咒诅，最后被赶出伊甸园。","19":"利26:12，参考出6:7；申1:31；耶7:23，11:4，30:22；结34:31，36:28","20":"约壹1:7,9，参考来10:19-20","21":"约壹3:34，参考徒2:38；约14:16-17；罗8:11；弗1:13-14","22":"太6:14-15；太18:21-35；可11:25-26；路6:37","23":"撒上13:8-14","24":"撒上15:22","25":"启4:8-11，5:6-14，7:9-12，11:15-18，15:2-4，19:1-8：人对上帝的敬拜；启21:5-8，上帝对人的呼召；启21:7，上帝称得胜者为祂的儿子，祂是得胜者的上帝。","26":"约3:16","27":"约17:3","28":"腓4:12-13，保罗在各种环境学会了依靠上帝。","29":"腓3:7-8，保罗以认识耶稣为至宝；腓3:12-14，保罗竭力追求要得着耶稣。","30":"赛30:20-21","31":"诗119:71","32":"约壹4:19","33":"太22:37-40","34":"来4:15-16，耶稣能体恤我们的软弱，我们就有勇气向上帝求帮助","35":"雅1:22","36":"罗7:14-15","37":"罗8:2","38":"约壹4:7","39":"约壹4:20","40":"约13:35","41":"太5:44-45","42":"民27:18-23，摩西按手在约书亚头上；申1:37-38，31:2-9，约书亚接替摩西带领以色列人。","43":"代上29:1-8，大卫预备材料；代下3~5章，所罗门建造圣殿。","44":"王上19:15-18，上帝拣选哈薛、耶户和以利沙来完成灭绝亚哈王的计划；王上17~18章，以利亚向亚哈王发出挑战；王上22:34-39，亚哈王被杀；王下9章，耶洗别和亚哈全家被杀。","45":"帖4:13-14，末底改的劝诫；帖7章，以色列人得救；帖9章，以色列人杀了仇敌。","46":"太28:18-20；可16:14-20，耶稣吩咐门徒要把福音传遍全地。","47":"林前4:2","48":"太25:21；路19:17，另外参考太24:45；路12:42；路16:10","49":"太25:14-30，赚五千和赚两千的都得到同样的称赞。","50":"提后2:2","51":"撒上2:35a","52":"约21:15-19","53":"林前10:31,33，凡事都是为了荣耀上帝和造就别人。","54":"徒2，4，10~11章，彼得勇敢向人传扬耶稣；徒3章，彼得靠耶稣行神迹；徒5章，彼得不怕人的威胁。","55":"徒3:6，4:19-20，5:29-32","56":"罗3:23-26，6章","57":"太28:19-20","58":"太6:9","59":"出15:22-25","60":"民14:22-35","61":"出33:18-23","62":"罗8:35-39","63":"申8:5；来5:17；诗94:12；箴3:11；来12:5-11，启3:19","64":"来12:7-8","65":"箴13:24，19:18","66":"创3:8-9","67":"创3:15，「……女人的后裔要伤你的头；你要伤他的脚跟」","68":"创3:21","69":"加6:1","70":"罗5:8","71":"诗103:8-13","72":"诗9篇，145:20，147:6","73":"约壹1:9，上帝必赦免一切的罪，不在乎怎样的罪。","74":"诗1:1，36:1,11，75:4","75":"恶人常常与奸诈、诡诈相提，参考箴2:22，12:5","76":"箴15:9，16:5","77":"雅4:6","78":"太18:7-9","79":"可9:42-47","80":"太18:15-17","81":"林前5:5"}},{"n":1,"num":"Ⅸ","title":"复兴的必需—服侍","verse":"「甘心事奉，好像服事主，不像服事人。」（弗6:7）","verse_ref":"","blocks":[{"t":"p","x":"耶稣的生命是一个「无己」的生命。祂把「无己」的生命赐给我们，叫我们不再为自己，而是活出「无己」的生命。从「有己」的生命转换到「无己」的生命这个「舍己」的过程，就是一个活出「为耶稣（Jesus）、为别人（Others）、不为自己（You）」的生活。这样的生活是充满喜乐（JOY）且有意义。耶稣来到世上的目的，不是为了满足自己，而是为了服事人：「正如人子来，不是要受人的服事，乃是要服事人，并且舍命，作多人的赎价」[^1]。我们得到耶稣的生命，不断地培养和活出耶稣的生命，就自然会活出耶稣的榜样，那就是「服侍」。每个活出耶稣生命的人，都是一个服侍者。要看到复兴，就必须有服侍！因为只有借着服侍，我们才能从中改变自己（舍己），进而培养耶稣的生命（无己），影响与祝福别人的生命。既然服侍如此重要且是必须的，那我们该对服侍有正确的观念，使我们在服侍的路上有正确的方向，走得稳健持久，而且越服侍越喜乐。"},{"t":"h","x":"服侍观"},{"t":"h","x":"什么是服侍？"},{"t":"p","x":"很多人把在教会中所做的事奉，当作是服侍。服侍只限于教会中吗？耶稣要门徒成为众人的仆人时，祂做了这个解释：「凡为我名接待一个像这小孩子的，就是接待我；凡接待我的，不是接待我，乃是接待那差我来的」[^2]，就连接待一个小孩，也算是服侍！接待小孩这个很平常的举动被称为服侍，关键在于这个行动是否「为耶稣的名」而作的。因为一个平凡的行动，不论是做在谁的身上，若是为耶稣而作，那就算是服侍主！因此服侍可定为：**为主的名而做的事**。"},{"t":"p","x":"不只在教会，在任何地方，甚至不局限在属灵的事，连日常生活中所做的事，只要是为主的名而做，如给人饭吃、给人水喝、给人住处、给人衣物、看顾关心人等，都是服侍[^3]。无论在家中，职场或学校，我们每日都能服侍主！只要是为了主的名！为了主的名殷勤工作；为了主的名而坚持到底；为了主的名而忍受羞辱；爱我们的仇敌等，都是服侍。服侍不只是主日在教会中所做的事，还应该是我们的生活方式，为了使别人得益处，使上帝的名得荣耀[^4]。"},{"t":"h","x":"服侍是谁的需要？"},{"t":"p","x":"服侍是因为别人的需要、教会的需要，还是我们自己的需要？我们服侍常是因为人有需要，或教会的事工需要。到底服侍是谁的需要？这是一个很重要的问题。若服侍是因为别人的需要，或是教会的需要，这样的服侍是被事情或需要所推动，容易感到疲惫，在面对困难和问题的时候，我们会软弱，想要放弃。"},{"t":"p","x":"**一、服侍是我们得救的目的。**圣经告诉我们：「我们原是神所作成的，是在基督耶稣里创造的，为的是要我们行各样的善事，就是神预先所安排的」[^5]。这句经文是对凡得救的人说的。得救是上帝的恩典，但我们得救的目的，就是为了要行各样的善事、就是为了服侍，是上帝预先安排要我们活在世服侍是我们的需要："},{"t":"p","x":"一、服侍是我们得救的目的"},{"t":"p","x":"二、服侍是操练与主同作王的机会"},{"t":"p","x":"三、服侍是我们能成长的机会"},{"t":"p","x":"四、服侍是我们投资的机会"},{"t":"p","x":"五、服侍使我们有用"},{"t":"p","x":"上的目的。若不服侍，我们的人生就没有意义，无法向上帝交待，并且会被上帝责备[^6]；因此服侍不只限于教会的领袖或同工，任何人都可以服侍，并且服侍不是别人的需要、不是教会的需要，乃是我们每个信徒的需要，因为，服侍是我们得救的目的。"},{"t":"p","x":"**二、服侍是操练与主同作王的机会。**在上帝的国中，谁是为大为首的呢？就是那些服侍的人[^7]，就是那些谦卑的人！一个人若一味要得到人的服侍，而不愿去服侍人，这是骄傲！耶稣教导门徒要彼此服侍，这样才能在上帝的国中，与耶稣一同掌权，审判十二支派[^8]。天上不容许有骄傲，天使长因为骄傲而坠落，而耶稣以谦卑服侍的生命战胜骄傲，回到天上；因此要能与主同作王，必须成为服侍者。我们曾在「无己的钥匙—谦卑」的单元中，提到一些实际操练的例子，能帮助我们在服侍中，天天操练谦卑，在服侍中操练舍己，朝无己的生命迈进，预备自己将来能与主同作王。"},{"t":"p","x":"**三、服侍是我们成长的机会。**生命的规律「有进有出」：吸入氧气，呼出二氧化碳；摄取食物，消化排泄，这样生命才能存活成长；而服侍就是我们属灵生命成长，并更多经历上帝的机会，让我们不再被动的领受，而是主动地分享给别人，就如人小时候被父母照顾，长大后成为父母去照顾孩子一样，「有进有出」的循环，不单孩子成长，父母自己的生命也有很大的成长。当我们认清服侍是我们的需要，一旦有机会，例如别人有需要时，我们就会主动的服侍，而且服侍得很享受。**因为别人的痛苦和需要，乃是我们服侍并成长的机会。**"},{"t":"p","x":"**四、服侍是我们投资的机会。**世界和世上的事都是暂时的，只有天上的事是永恒有价值[^9]。那如何储蓄在天上呢？耶稣对少年财主说：「你还缺少一件：去变卖你所有的，分给穷人，就必有财宝在天上；你还要来跟从我」[^10]。可见，变卖所有的，和分给穷人，是积蓄财宝在天上的方式；因此耶稣要少年财主，把拥有的金钱给有需要的人。我们不但能给金钱，也能给祷告、时间、照顾和服务[^11]。为了耶稣，把所拥有的，分给有需要的人，就是服侍人，就能积蓄财宝在天上。世上的一切都会成为过去，**留下来的不是我们的，给出去的才是我们的！**换言之，服侍是把地上所有的，投资在天上的方式，每一次的服侍，都是我们投资在天上的机会！"},{"t":"p","x":"**五、服侍使我们有用。**耶稣曾说过一个主人按着个人的才干给银子的比喻：有拿五千的、也有拿两千、一千的[^12]。后来五千的赚五千；两千的赚两千。同样的，上帝给每个人不同的才干，不管多或少，上帝要求我们去用这些才干，也就是去服侍。在天国里，只要肯使用神给我们的才干，只有赚，没有亏！当他们拿主人给的银子去赚更多银子时，不论赚多或赚少，都得到主人同样的称赞和祝福。"},{"t":"p","x":"但那领一千的，却把银子埋起来，等主人回来时原银奉还！主人不单责备他，还把他所有的，夺来给那有一万的。不要以为不服侍是一件小事！许多人不服侍，是因为觉得自己所拥有并不多，跟别人比真是微不足道，不服侍应该不会影响到上帝的国，上帝也应该不会责怪吧！我们不要小看自己所有的，即使只有一千，我们也能用这一千来服侍。上帝的原则很简单—「因为凡是有的，还要给他，他就充足有余；凡是没有的，就算他有甚么也要拿去」[^13]。不论我们觉得自己有多少，只要**用了就有用，不用就无用，越用越好用！**"},{"t":"h","x":"谁能服侍？"},{"t":"p","x":"服侍是我们的需要。那是不是每个人都能服侍呢？正如之前所提到的：上帝不在乎我们有多少，只要愿意被上帝使用，人人都能服侍。既然如此，为什么还有许多人不敢起来服侍呢？其中几个常听到的原因是：「我没有装备」、「我没有恩赐」、「我没有时间」等。"},{"t":"p","x":"「我没有装备」：人常常觉得自己装备的不够，以致不敢服侍。每件事开始做时，总是最困难的，因为没把握能做好、害怕会失败；但若要等到不会犯错才去做，我们就永远什么都不用做了，因为，每件事都是在做中不断学习才成功的。比如骑脚踏车，不论听了多少理论，若不骑上脚踏车，就永远学不会！骑上脚踏车也许会跌倒，但在过程中，就渐渐学会了平衡。同样的，没有一个人是装备好了才去服侍的，只需要踏出信心的第一步，在服侍中我们就不断被装备，行上帝预先所安排的各样善事。"},{"t":"p","x":"「我没有恩赐」：人也常限制能做的事，和所拥有的恩赐。当该项服侍不在我们的恩赐范围内，我们还没尝试，就先拒绝了！上帝是一切恩赐的源头[^14]，上帝能使无变有[^15]，五饼二鱼能喂饱上万人[^16]，祂也能使我们所拥有的恩赐加增；这不意味着我们什么服侍都要做，我们固然需要按着上帝所赐的恩赐服侍，但也不要限制上帝能借着我们所成就的事，在有需要的情况下，上帝会赐给我们其它恩赐来服侍。"},{"t":"p","x":"「我没有时间」：人觉得没时间服侍，通常是因服侍不是他生命中的优先。换句话说，「有没有时间」是价值观的问题。忙碌的生意人，在孩子病危的时候，也会抽出时间，放下生意来陪伴孩子。我们若看见生命的短暂，就会赶快把握能服侍的机会！关键不在于有没有时间，而是上帝是否是我们生命中的优先？我们若立志为主活，为主的名做事，那么每时刻都是在服侍！"},{"t":"h","x":"服侍是上帝的恩典"},{"t":"p","x":"服事是上帝给我们的恩典，是用上帝所给我们的，去分给需要的人。不难吧？上帝并没有要求超过我们能服侍的，也没有拿我们的服侍与其他人作比较。我们更不需要与他人做比较，因为上帝只要求我们忠心服侍，按着上帝的心意，把上帝所给的能力和才干分给别人。若不是上帝赐恩典，我们什么都不能做！因此即使我们的服侍有很大的果效，都不是我们有什么了不起，没有什么可夸的，这都是上帝的恩典！"},{"t":"p","x":"服侍是上帝给我们的恩典，上帝赐福给我们，让我们既能服侍，又借着服侍领受更大的祝福。若认明能服侍是上帝的恩典，是极大的恩典，也是我们的需要，我们就不会偷懒，反而会格外殷勤服侍[^17]。在服侍时会心存感激、不埋怨地把握每个可以服侍的机会。"},{"t":"h","x":"服侍之路"},{"t":"p","x":"每个人都需要服侍，我们必须知道该如何服侍才能使服侍持久。**「灵一悟一命一侍一神」**这简单的五个字可以表达服侍之路的重要阶段。耶稣是服侍的焦点。「因为万有都是本于祂，倚靠祂，归于祂。愿荣耀归给祂，直到永远」[^18]。**服侍开始于耶稣，最终是为了耶稣，过程中也不能没有耶稣。**"},{"t":"p","x":"服侍之路："},{"t":"p","x":"灵悟命侍神"},{"t":"p","x":"服侍需要从依靠圣灵开始（灵）[^19]，而不是依靠自己的聪明。依靠圣灵不是感觉，而是一个选择！圣灵其中一个最重要的工作，就是帮助我们领悟上帝的话（悟）[^20]。单单只是靠圣灵的服侍，就像种子随风在空中随处飘浮。但当上帝的灵，加上上帝的话，这样的服侍就像种子落地，变得踏实；然而这样的服侍还不足够。我们必须靠着上帝的灵，并把对上帝话语的领悟，化为行动，形成我们的生命（命）；这样的服侍就像种子扎根，变得稳固而且亘根基[^21]。「灵一悟一命」是我们个人的得着，并没有给出去，灵命仍不健全！服侍（侍）使我们的灵命成长；而灵命的培养则是使服侍更有效力。但真正有影响力的服侍，是生命的服侍[^22]，是用生命影响生命。循环「灵一悟一命一侍」，我们的服侍就能被主大用。在被主大用时，不要夺取上帝的荣耀，而是要将一切荣耀归给耶稣。切记，服侍最终目的，就是要让耶稣得着一切的荣耀（神）[^23]。"},{"t":"p","x":"服侍之路的每个阶段都是互相串连起来的，必须完成一个阶段，才能进入下一个阶段，就像长途赛中的每一个检查站，选手从起跑点开始，必须经过每一个检查站，最终抵达终点，才算是完成赛程。检查站能让选手知道自己正在正确的跑道上，而且已经越来越靠近终点。检查站为选手添力，使他们能继续完成赛程，选手不能错过任何一个检查站，也不能在任何一个检查站停顿，不然就不算完成赛程。同样的，服侍之路的每个阶段就像赛程中的检查站，都是很重要且相互串连的。若要服侍直到见主面，我们必须有正确的起点，还要经过每个服侍的阶段，并要迈向服侍的终点。缺少了其中一个阶段，都会影响我们的服侍，甚至会导致服侍的终止！"},{"t":"h","x":"灵一圣灵（圣灵是我的引导）"},{"t":"p","x":"不是每个奉主名所做的服侍都能得上帝的称赞，唯独遵行上帝旨意的服侍，才是被悦纳的[^24]！服侍中有两条不同的路，一条是依靠圣灵，并遵行上的旨意，另一条路是依靠且己，并满足自己的意思。「体贴肉体的，就是死；体贴圣灵的，乃是生命、平安」[^25]。体贴肉体或体贴圣灵，是服侍中两个相对的起点。体贴肉体，就是随着自己私欲，结果就是死。服侍若是为了满足自己，这样的服侍会让人觉得吃力，而且越服侍越无力，最后终止服侍。反之，体贴圣灵，就是随着上帝心意的结果，就是生命、平安，这样的服侍会让人觉得轻松，越服侍越有活力、有平安。若我们在服侍中感到烦躁或有埋怨时，不妨问问自己：「**我们服侍是体贴圣灵，还是体贴自己？**」"},{"t":"p","x":"「我们若是靠圣灵得生，就当靠圣灵行事」[^26]。依靠圣灵不单是服侍的起点，更是正确服侍的导向。我们需要靠圣灵行事，依靠自己的才干，或抄袭别人的服侍方式，都是有限的，这样的服侍无法抵达终点，就是让耶稣得一切的荣耀！因为满足人的需要、生命的改变都是上帝的工作！只有依靠圣灵的服侍，才能进入无限，经历圣灵的大能，并各样的神迹奇事，才能满足上帝的心！"},{"t":"p","x":"要如何依靠圣灵呢？就是**「用心」**服侍，而不是「用脑」。「用脑」服侍就是上段所说的：靠自己或别人的聪明和方式，想要把服侍做好。依靠圣灵，不是把自己变成机器人般按照指令行事，而是寻求圣灵，并顺服圣灵的带领去行。让圣灵引导是一个抉择！选择学耶稣的榜样，选择顺服圣经的准则[^27]，选择「用心」服侍，对上帝毫无保留，放弃我的权力和聪明，如此就能让耶稣作王！而无论做了什么，都是上帝的作为和恩典，就让耶稣得一切荣耀！当我们反覆行，成为新我的生命，就开始建立无己的属神体系。"},{"t":"h","x":"悟一领悟（圣经是我的准则）"},{"t":"p","x":"「灵」的服侍阶段必须进入「悟」的服侍阶段，才能达到平衡。圣经能印证圣灵的工作；圣灵的工作能见证圣经。依靠圣灵能力的服侍，虽让人感到兴奋，但若没有上帝的话语，就仍是飘浮，就像根基建在沙土上，而且对圣灵的工作没有可供辨明的标准，会因人事物而影响信心，服侍的生命时好时坏；依靠圣灵加上上帝话语的服侍，让人的信心有凭据，服侍有生命力[^28]！，服侍需要上帝的灵，也需要上帝的话，这是耶稣服侍的榜样[^29]。耶稣的服侍中，常常带着圣灵的能力，口中也常宣讲上帝的话语[^30]；使徒的服侍也是如此，当使徒被圣灵充满时，彼得开口说出上帝的话，就有三千人悔改信主[^31]。"},{"t":"p","x":"没有「灵」的阶段，就无法进入「悟」的阶段，因为圣灵使我们能领悟上帝的话。没有领悟，上帝的话只是头脑里的资讯；有了领悟，止帝的话就成为心中的启示。领悟上帝的话语，能使人的观念改变[^32]，而观念的改变，带来生命的改变！因为领悟上帝的话，能使人产生盼望和信心[^33]，服侍时面对艰难和困境时，也不容易放弃，能得着上帝所应许的[^34]。在服侍中领悟上帝的话，使服侍者能享受，因为这样的服侍，不是被人推动，也不是被需要推动，而是被上帝推动，这样的服侍才能持久！"},{"t":"p","x":"如何领悟上帝的话呢？**谦卑！**谦卑是得着领悟的关键，圣灵愿意将上帝的话，向谦卑的人显明，向自以为聪明的人就隐藏起来[^35]。人的聪明永远无法领悟上帝的话，唯有圣灵能带领我们进入上帝的话语中[^36]。"},{"t":"h","x":"命一生命（耶稣是我的榜样）"},{"t":"p","x":"「灵一悟」是服侍之路很重要的开始，因为这样的服侍选择依靠圣灵，按着上帝的心意，而非自己的意思；然而「灵一悟」的服侍阶段并不足够，只能使人知道上帝的大能一信心，还必须把上帝的话化为行动，成为我们的生命。信心若没有行为，仍然是死的[^37]。「叫人活着的乃是灵，肉体是无益的。我对你们所说话就是灵，就是生命」[^38]。上帝的话不单是灵，而且是生命，上帝的话叫人的心灵苏醒[^39]，也使人的生命改变[^40]。在服侍的路上若要持久，不单要有「灵一悟」的阶段，也需要进入「命」的阶段。"},{"t":"p","x":"最能吸引人的是生命！耶稣不单有「灵一悟」的服侍阶段，祂也用「命」来服侍。祂的服侍中，有圣灵的能力，和上帝话语的能力，许多人因而跟随祂，但这些人在考验来临时，都离弃了耶稣！「灵一悟」的服侍阶段所带来的影响还不稳固，加上「命」的服侍，就变得有根基[^41]、能持久。耶稣在十字架上用生命「活给我们看」，并「死给我们看」。耶稣复活后，使徒及其他被耶稣生命影响的人，继续效法耶稣的榜样，甚至愿意摆上他们的生命。这种生命的服侍，不是理论或启示，而是以生命为榜样，以生命成为见证，是「以命传命，以命换命」。"},{"t":"p","x":"要如何以「命」来服侍呢？关键在于顺服的「行动」。培养生命的基本功：**正确的「看一听一想一讲一行」**，使我们能进入「命」的服侍阶段。有了「灵一悟」，加上反覆「看一听一想一讲一行」来培养生命，我们就能活出耶稣的生命。以「命」来服侍是很有果效的，因为是耶稣的生命吸引人到祂的面前[^42]。从「知道」要「做到」，顺服去行，我们就能「得到」！"},{"t":"h","x":"侍一服侍（让耶稣作王）"},{"t":"p","x":"「灵一悟一命」的目的就是为了「侍」。若没有进入「侍」的阶段，就像生命只有「进」却没有「出」，至终面临死亡。同样的，若没有进入「侍」的阶段，服侍之路也会面对死亡！"},{"t":"p","x":"一个人若缺乏「灵一悟一命」任一阶段的服侍，都是不完整的，都不能让耶稣作王和得一切荣耀！缺乏「灵」的服侍，也许上帝的话很丰富，却无法体会和进入圣灵丰盛自由的生命，他的「命」的服侍，还是靠自己，靠方法。缺乏「悟」的服侍，圣灵的工作火热，却没有上帝的话，无法落地，容易随风改变，「命」的服侍很脆弱。缺乏「灵一悟一命」的服侍是需要靠上帝推动或别人推动，有推就有动！不推就不动！这样的服侍像在做事，容易让人枯干，是无法在火烧的考验后存留的[^43]！只有经过「灵一悟一命」的阶段，才能有真正的服侍，这样的服侍既有圣灵的带领，又有上帝的话印证，服侍者是「以命传命」，服侍时让人看见耶稣，就必经历得胜。因为哪里让耶稣作王，就必在那里看见上帝能力的彰显，撒旦在人生命中的捆绑被断开，并带来人生命的改变。这种「灵一悟一命一侍」的服侍，是让耶稣作王，服侍是轻松的，越服侍越兴奋、越服侍越有动力！因为不是我们在做，而是耶稣在做！"},{"t":"p","x":"在「灵一悟一命一侍」的服侍中，固然会有上帝能力的彰显，但外在能力的彰显，却不是我们所追求的！若追求能力，感觉，现象，那还是停留在「灵」的服侍中。**服侍最主要的目的是要建立关系**，使人与上帝、及人与人之间的关系得建立。耶稣在服侍门徒时曾如此说：「我是你们的主，你们的夫子，尚且洗你们的脚，你们也当彼此洗脚」[^44]。洗脚的服侍虽然看来是一件事，但洗脚的服侍，是为了使门徒得洁净[^45]，能建立与上帝的关系，而且为了使他们能彼此洗脚，建立与人之间的关系，耶稣接着说：「我给你们作了榜样，叫你们照着我向你们所做的去做」[^46]。服侍的目的就是为了传承，得到耶稣生命的价值，在于繁殖耶稣的生命，使人效法我，像我效法耶稣一样[^47]，那就是传承！因此耶稣给我们大使命，使万民成为耶稣的门徒[^48]，能效法耶稣的榜样。"},{"t":"p","x":"如何传承呢？要传承就必须愿意「舍己」。「……一粒麦子不落在地里死了，仍旧是一粒，若是死了，就结出许多子粒来」[^49]。要结出许多子粒，条件就是那粒麦子需要先「落」在地里「死」了，也就是「舍己」。一个很重要的理念，就是「尽力帮助别人比自己更成功」，只有愿意「舍己」，愿意「为耶稣、为别人、不为自己」，才能够达到建立关系的传承，就像耶稣的服侍，到最后就是要舍命，成为多人的赎价[^50]，就是「我死，让你活」，唯有毫无保留的服侍，才能带来生命的传承！"},{"t":"h","x":"神一荣耀归于上帝（让耶稣得到一切的荣耀）"},{"t":"p","x":"「灵一悟一命一侍」的服侍，会使我们的服侍越来越有影响力，因此容易让人迷失在只追求「灵一悟一命一侍」，忘了服侍的终点，是要将「一切荣耀归给上帝」。若不将荣耀归给上帝，就是没有进入「神」的服侍阶段，那么不论服侍的成就有多大，都会面对死亡[^51]。「凡自高的，必降为卑；自卑的，必升为高」[^52]。骄傲导致人在服侍的路上跌倒[^53]，只有持续保持谦卑的心态，我们才能继续服侍主，持续到见主面的日子。"},{"t":"p","x":"「服侍是上帝的恩典」，是活在谦卑一个很重要的观念。保罗，一个被主大用的人如此说：「然而，我今日成了何等人，是蒙神的恩才成的。并且祂所赐我的恩不是徒然的。我比众使徒格外劳苦；这原不是我，乃是神的恩与我同在」[^54]。人若「看见」是上帝的恩典，他就能谦卑地服侍，即使比别人更劳苦，也没有可夸可怨的，因为是上帝的恩与我们同在！"},{"t":"p","x":"如何将荣耀归给上帝？就是活出「无己」的生命—活着不再是我，乃是耶稣，焦点是耶稣，正如施洗约翰的心声：「祂必兴旺，我必衰微」[^55]，不是为了让人认识我，而是让人认识耶稣。如何达到呢？就是「不见一人，只见耶稣」—隐藏，不要出名、不要出头！出头，目标明显，就容易被砍头；让耶稣出头，就是让耶稣作王，没人敢砍耶稣的头！因为只有耶稣配得一切的荣耀。"},{"t":"h","x":"灵一悟一命一侍一神"},{"t":"p","x":"「灵一悟一命一侍一神」是服侍之路。一直到见主面前，我们都需要不断走在这条服侍的路，不要忽略或停留在任何一个阶段，因为每个阶段都是重要的提醒，及自我检讨的标准。持续在「灵一悟一命一侍一神」的路上服侍，我们就能迈进末后的大复兴、迎接耶稣的再来！"},{"t":"p","x":"「灵ㄧ悟一命一侍一神」也是本书3-2-1在个人层面的落实。"},{"t":"p","x":"**圣灵是我的引导**：「灵」是圣灵，我们需要用心服侍才能被圣灵引导。"},{"t":"p","x":"**圣经是我的准则**：「悟」是领悟，我们的服侍不是按着我们的想法和方式，而是按着圣灵所启示上帝的话。上帝的话就是我们的准则和方向。"},{"t":"p","x":"**耶稣是我的榜样**：「命」是生命，借着五个基本功「看一听一想一讲一行」，培养耶稣的生命，活出耶稣的生命。"},{"t":"p","x":"**让耶稣作王**：「恃」是服侍，不是我们在做，而是让耶稣做。这样的服侍是经历得胜，战胜撒旦的权势，使人的生命得改变，当我们让耶稣作王，就能恢复管理的权柄，带来服侍的果效。"},{"t":"p","x":"**让耶稣得到一切的荣耀**：「神」是荣耀归于神，这是服侍的最终目标。在服侍中，我们的渴望就是让人看见耶稣，并将一切的荣耀归给耶稣。"},{"t":"p","x":"「灵一悟一命一侍一神」让我们能在服侍的路上落实3-2-1，并在我们个人生命中建立属神的体系。属神的体系在我们生命中建立，那么我们属灵的生命自然能健壮有力，我们会越服侍越像耶稣，越服侍越看见耶稣得荣耀！若离开了「灵一悟一命一侍一神」的路来服侍，我们属灵的生命就会死，服侍会走到一个瓶颈。"},{"t":"p","x":"3-2-1的路在于「无己」。要走「灵一悟一命一侍一神」的路也在于「无己」。「有己」就无路；「无己」就有路，耶稣就是道路！当我们愿意选择「无己」，我们就会在服侍中找到出路，走在「灵ㄧ悟一命一侍一神」的服侍路上，直到见主面，让我们迈进末后大复兴吧！"},{"t":"p","x":"3-2-1在个人的落实："},{"t":"p","x":"灵：圣灵是我的引导"},{"t":"p","x":"悟：圣经是我的准则"},{"t":"p","x":"命：耶稣是我的榜样"},{"t":"p","x":"侍：让耶稣作王"},{"t":"p","x":"神：让耶稣得着一切的荣耀"},{"t":"p","x":"1"}],"fns":{"1":"太20:28","2":"可9:35-37","3":"太25:34-40","4":"林前10:31,33","5":"弗2:10","6":"太25:25-30","7":"可10:42-45；路22:25-27","8":"路22:28-30","9":"林后4:18","10":"可10:21","11":"太23:35-40，做在最小的弟兄身上的事就是做在耶稣身上，在天上必被记念；太6:1-21，在耶稣提到积财宝在天上，耶稣提到好些我们在暗中所做的事，天父必报答，其中包括施舍、祷告、饶恕人、禁食……","12":"太25:14-30","13":"太25:29","14":"雅1:17，参考弗4:7-8，耶稣把各样的恩赐赐给人。","15":"诗33:9","16":"太14:17-21；可6:38-44；路9:13-17","17":"林前15:10","18":"罗11:36","19":"箴3:5-6；亚4:6","20":"约14:26，16:13","21":"太7:24-27","22":"约13:14-15：耶稣的服侍就是用生命成为榜样，参考林前11:1：保罗的服侍。","23":"彼前4:11","24":"太7:21-23","25":"罗8:6","26":"加5:25","27":"罗8:14；林前2:9-10；约16:13","28":"林后3:6","29":"约3:34","30":"太9:35，7:29；可1:22-28","31":"徒2章","32":"来4:12","33":"罗10:17","34":"来11章；雅1:6","35":"太11:25","36":"约16:13","37":"雅2:17","38":"约6:63","39":"诗19:7","40":"罗12:2；西3:9-10","41":"太7:24-27","42":"约12:32","43":"林前3:13-15","44":"约13:14","45":"约13:10","46":"约13:15","47":"林前11:1","48":"太28:19-20","49":"约12:24","50":"太20:28","51":"徒12:23","52":"太23:12；路14:11，18:14，参考雅4:10；彼前5:6","53":"箴16:18","54":"林前15:10","55":"约3:30"}}]</script>

/* ============ HELPERS ============ */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escA(s){return esc(String(s==null?"":s)).replace(/"/g,"&quot;");}
/* ===== App 内建提示与确认（取代被独立 PWA 停用的 alert/confirm） ===== */
window.uiToast=function(msg){
  var t=document.getElementById("ui-toast");
  if(!t){ t=document.createElement("div"); t.id="ui-toast"; (document.body||document.documentElement).appendChild(t); }
  t.textContent=msg; t.className="ui-toast show";
  if(window.__toastT) clearTimeout(window.__toastT);
  window.__toastT=setTimeout(function(){ var e=document.getElementById("ui-toast"); if(e) e.className="ui-toast"; }, 2400);
};
window.uiConfirm=function(msg,onYes){
  var ov=document.getElementById("ui-confirm");
  if(!ov){ ov=document.createElement("div"); ov.id="ui-confirm"; (document.body||document.documentElement).appendChild(ov); }
  ov.className="ui-cf-ov show";
  ov.innerHTML='<div class="ui-cf-box"><div class="ui-cf-msg" id="ui-cf-msg"></div><div class="ui-cf-btns"><button class="ui-cf-no" id="ui-cf-no">取消</button><button class="ui-cf-yes" id="ui-cf-yes">确定</button></div></div>';
  var m=document.getElementById("ui-cf-msg"); if(m) m.textContent=msg;
  var close=function(){ var o=document.getElementById("ui-confirm"); if(o){ o.className="ui-cf-ov"; o.innerHTML=""; } };
  var no=document.getElementById("ui-cf-no"); if(no) no.onclick=close;
  var yes=document.getElementById("ui-cf-yes"); if(yes) yes.onclick=function(){ close(); if(onYes) onYes(); };
};
/* ===== 备份 / 还原：把画线、领受、进度存成档案，可换机或清快取后还原 ===== */
window.exportBackup=function(){
  try{ if(typeof saveState==="function") saveState(); }catch(e){}
  var raw=localStorage.getItem(LS_KEY)||"{}";
  var d=new Date();
  var ymd=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
  var fname="晨读321-备份-"+ymd+".json";
  var dataObj; try{ dataObj=JSON.parse(raw); }catch(e){ dataObj={}; }
  var payload=JSON.stringify({app:"chendu321",type:"backup",ver:1,date:d.toISOString(),data:dataObj});
  var blob=new Blob([payload],{type:"application/json"});
  try{
    if(navigator.canShare && window.File){
      var file=new File([blob],fname,{type:"application/json"});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:"晨读321 备份",text:"晨读321 的画线与领受备份"}).then(function(){
          if(typeof uiToast==="function") uiToast("已开启分享，可存到「档案」或传给自己");
        }).catch(function(){});
        return;
      }
    }
  }catch(e){}
  try{
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ try{document.body.removeChild(a);}catch(_){} URL.revokeObjectURL(url); },1500);
    if(typeof uiToast==="function") uiToast("已汇出备份档："+fname);
  }catch(e){
    if(typeof uiToast==="function") uiToast("汇出失败，请改用 Safari 开启再试一次");
  }
};
window.importBackup=function(){
  var inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json"; inp.style.display="none";
  inp.onchange=function(ev){ window.__onBackupFile(ev); try{document.body.removeChild(inp);}catch(e){} };
  document.body.appendChild(inp); inp.click();
};
window.__onBackupFile=function(ev){
  var f=ev&&ev.target&&ev.target.files&&ev.target.files[0]; if(!f) return;
  var reader=new FileReader();
  reader.onload=function(){
    var obj=null;
    try{ obj=JSON.parse(String(reader.result||"")); }catch(e){ if(typeof uiToast==="function") uiToast("这个档案不是有效的备份档"); return; }
    var data=(obj&&obj.app==="chendu321"&&obj.data)?obj.data:obj;
    if(!data||typeof data!=="object"||(!data.marks&&!data.notes&&!data.read&&!data.checked)){
      if(typeof uiToast==="function") uiToast("这个档案看起来不是晨读321的备份"); return;

function inline(text){
  let out="", last=0, re=/⟦([bsg]):([^⟧]*)⟧/g, m;
  while((m=re.exec(text))!==null){
    if(m.index>last) out+=esc(text.slice(last,m.index));
    const v=esc(m[2]);
    if(m[1]==="b") out+='<strong class="b">'+v+'</strong>';
    else if(m[1]==="s") out+='<span class="s">'+v+'</span>';
    else out+='<span class="g">'+v+'</span>';
    last=m.index+m[0].length;
  }
  if(last<text.length) out+=esc(text.slice(last));
  return out;
}

/* ---- 连续晨读天数 ---- */
function todayStr(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dayDiff(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
function markReadDay(){
  var t=todayStr();
  if(state.lastDate===t) return;          // 今天已计入
  if(state.lastDate){
    var diff=dayDiff(state.lastDate,t);
    if(diff===1) state.streak=(state.streak||0)+1; // 连续
    else if(diff>1) state.streak=1;                // 中断后重新开始
    else if(!state.streak) state.streak=1;         // 时钟异常的保险
  } else { state.streak=1; }
  state.lastDate=t;
  if((state.streak||0)>(state.best||0)) state.best=state.streak;
}
function effectiveStreak(){ // 显示用：今天或昨天有读才算仍在连续中
  if(!state.streak||!state.lastDate) return 0;
  return dayDiff(state.lastDate,todayStr())<=1 ? state.streak : 0;
}

function mkLessonByN(n){ for(var i=0;i<LESSONS.length;i++){ if(LESSONS[i].n===n) return LESSONS[i]; } return null; }
function mkSplit(raw){
  raw=String(raw||""); var out=[], cur="", depth=0;
  for(var i=0;i<raw.length;i++){
    var ch=raw[i]; cur+=ch;
    if(ch==="⟦"){ depth++; }
    else if(ch==="⟧"){ if(depth>0) depth--; }
    else if(depth===0 && (ch==="。"||ch==="！"||ch==="？")){
      while(i+1<raw.length && "」』）".indexOf(raw[i+1])>=0){ i++; cur+=raw[i]; }
      out.push(cur); cur="";
    }
  }
  if(cur.replace(/\s/g,"").length) out.push(cur);
  return out;
}
function mkParaList(t){
  t=String(t||""); var arr=t.split("\n"), out=[];
  for(var i=0;i<arr.length;i++){ if(arr[i].replace(/\s/g,"").length) out.push(arr[i]); }
  return out;
}
function spkOrdCN(n){ return ["零","一","二","三","四","五","六","七","八","九","十"][n]||String(n); }
function mkSentence(l,key){
  var h=key.indexOf("#"); var pid=key.slice(0,h); var si=parseInt(key.slice(h+1),10);
  var m=pid.match(/^[A-Za-z]+/); var pre=m?m[0]:""; var rest=pid.slice(pre.length);
  var raw="";
  if(pre==="L"){ raw=l.lead||""; }
  else if(pre==="D"){ var ab=rest.split("-"); var dsec=(l.sections||[])[parseInt(ab[0],10)]; var list=dsec?mkParaList((dsec.deeper&&dsec.deeper.a)||""):[]; raw=list[parseInt(ab[1],10)]||""; }
  else if(pre==="F"){ raw=l.focus||""; }
  else if(pre==="H"){ raw=(l.hope&&l.hope.paras&&l.hope.paras[parseInt(rest,10)])||""; }
  else if(pre==="SH"){ raw=l.still_hint||""; }
  else if(pre==="S"){ raw=l.still||""; }
  else if(pre==="T"){ var _ti=parseInt(rest,10); var st=(l.steps&&l.steps[_ti]); raw=st?("第"+spkOrdCN(_ti+1)+"，"+(st.act||"")):""; }
  else if(pre==="Q"){ raw=l.declare||""; }
  else if(pre==="R"){ var _ri=parseInt(rest,10); var sh=(l.share&&l.share[_ri]); raw=sh?("第"+spkOrdCN(_ri+1)+"，"+(sh.q||"")):""; }
  else if(pre==="V"){ raw=l.verse||""; }
  else if(pre==="B"){ raw=l.bigidea||""; }
  else if(pre==="P"){ var psec=(l.sections||[])[parseInt(rest,10)]; raw=psec?(psec.pq||""):""; }
  else{ var ab2=pid.split("-"); var sec=(l.sections||[])[parseInt(ab2[0],10)]; raw=sec?((sec.paras||[])[parseInt(ab2[1],10)]||""):""; }
  var arr=mkSplit(raw); return (arr[si]||"").replace(/^\s+/,"");
}
function mkInline(l,paraId,raw){

/* 書本目錄頁：一次把整本書的語音抓進 IndexedDB，之後全書離線可聽 */
window.spkPreloadBookAll = function(){
  try{ spk.voiceOverride = null; }catch(_){}
  if(typeof yunEnabled!=="function" || !yunEnabled()){ if(typeof uiToast==="function") uiToast("目前使用装置内建语音，本来就能离线，无需下载"); return; }
  if(window.__spkPreloadBusy) return;
  var pieces=[], seen={};
  (BOOK||[]).forEach(function(u){
    yunChunks(spkSanitize(bookSpeakText(u))).forEach(function(p){ if(!seen[p]){ seen[p]=1; pieces.push(p); } });
  });
  if(!pieces.length){ if(typeof uiToast==="function") uiToast("没有可下载的语音"); return; }
  var okGo=true;
  try{ okGo=window.confirm("要预先下载全书 "+pieces.length+" 段语音吗？建议在 Wi-Fi 环境下进行。"); }catch(_){}
  if(!okGo) return;
  window.__spkPreloadBusy=true;
  var total=pieces.length, ok=0, fail=0, started=0, running=0, CONC=3;
  function btn(){ return document.getElementById("bk-all-preload-btn"); }
  function label(x){ var b=btn(); if(b) b.textContent=x; }
  function disable(d){ var b=btn(); if(b) b.disabled=!!d; }
  disable(true); label("下载中… 0/"+total);
  function pump(){
    while(running<CONC && started<pieces.length){
      var piece=pieces[started++]; running++;
      yunFetch(piece).then(function(){ ok++; }, function(){ fail++; }).then(function(){
        running--; label("下载中… "+(ok+fail)+"/"+total); pump();
      });
    }
    if(running===0 && started>=pieces.length){
      window.__spkPreloadBusy=false; disable(false);
      if(fail){ label("已下载 "+ok+"/"+total); if(typeof uiToast==="function") uiToast("大致下载完成，少数段落可稍后再按一次补齐"); }
      else { label("✓ 全书语音已下载，离线可听"); if(typeof uiToast==="function") uiToast("全书语音已下载，之后离线也能听"); }
    }
  }
  pump();
};
window.spkPreloadBook = function(){
  spk.voiceOverride = null;
  var u = (BOOK||[])[state.bookUnit];
  if(!u){ if(typeof uiToast==="function") uiToast("请先打开一个单元再下载"); return; }
  if(!yunEnabled()){ if(typeof uiToast==="function") uiToast("目前使用装置内建语音，本来就能离线，无需下载"); return; }
  if(window.__spkPreloadBusy) return;
  var chunks = yunChunks(spkSanitize(bookSpeakText(u)));
  if(!chunks.length){ if(typeof uiToast==="function") uiToast("本单元没有可下载的语音"); return; }
  window.__spkPreloadBusy = true;
  var total = chunks.length, ok = 0, fail = 0, started = 0, running = 0, CONC = 3;
  function eachBtn(fn){ ["bk-preload-btn","rd-preload-btn"].forEach(function(id){ var b=document.getElementById(id); if(b) fn(b); }); }
  function label(t){ eachBtn(function(b){ b.textContent = t; }); }
  function disable(d){ eachBtn(function(b){ b.disabled = !!d; }); }
  disable(true); label("下载中\u2026 0/" + total);
  function pump(){
    while(running < CONC && started < chunks.length){
      var piece = chunks[started++]; running++;
      yunFetch(piece).then(function(){ ok++; }, function(){ fail++; }).then(function(){
        running--; label("下载中\u2026 " + (ok + fail) + "/" + total); pump();
      });
    }
    if(running === 0 && started >= chunks.length){
      window.__spkPreloadBusy = false; disable(false);
      if(fail){ label("已下载 " + ok + "/" + total + " (tap again later to finish)"); if(typeof uiToast==="function") uiToast("Mostly downloaded \u2014 a few parts can be retried later"); }
      else { label("\u2713 Whole chapter downloaded \u2014 plays offline"); if(typeof uiToast==="function") uiToast("Whole chapter downloaded \u2014 plays offline from now on"); }
    }
  }
  pump();
};

function mkTabOf(pid){
  var m=pid.match(/^[A-Za-z]+/); var pre=m?m[0]:"";
  if(pre==="L") return {tab:"read",label:"读",rank:1};
  if(pre==="D"){ var ab=pid.slice(1).split("-"); return {tab:"read",label:"想更深",rank:1,deep:"d"+ab[0]}; }
  if(pre==="F") return {tab:"focus",label:"对焦",rank:2};
  if(pre==="H") return {tab:"hope",label:"盼望",rank:3};
  if(pre==="SH") return {tab:"still",label:"静",rank:4};
  if(pre==="S") return {tab:"still",label:"静",rank:4};
  if(pre==="T") return {tab:"steps",label:"操练",rank:5};
  if(pre==="Q") return {tab:"declare",label:"宣告",rank:6};
  if(pre==="R") return {tab:"share",label:"分享",rank:7};
  if(pre==="V") return {tab:"read",label:"经文",rank:1};
  if(pre==="B") return {tab:"read",label:"核心",rank:1};
  if(pre==="P") return {tab:"read",label:"省思",rank:1};
  return {tab:"read",label:"读",rank:1};
}
function mkKeyOrder(key){
  var pid=key.slice(0,key.indexOf("#"));
  var nums=(pid.match(/\d+/g)||[]).map(Number);
  var sidx=parseInt(key.slice(key.indexOf("#")+1),10)||0;
  return [mkTabOf(pid).rank, nums[0]||0, nums[1]||0, sidx];
}
function mkCounts(){
  var marks=0, lessons=0;
  if(state.marks){ Object.keys(state.marks).forEach(function(k){ var o=state.marks[k]; var c=o?Object.keys(o).length:0; if(c){ marks+=c; lessons++; } }); }
  return {marks:marks, lessons:lessons};
}
function mkLessonMarkCount(n){
  var m=state.marks&&state.marks[n]; if(!m) return {marks:0,notes:0};
  var keys=Object.keys(m), notes=0;
  keys.forEach(function(k){ if(String(m[k]||"").trim()) notes++; });
  return {marks:keys.length, notes:notes};
}
function mkSortedKeys(m){
  var keys=Object.keys(m);
  keys.sort(function(a,b){var A=mkKeyOrder(a),B=mkKeyOrder(b);for(var i=0;i<4;i++){if(A[i]!==B[i])return A[i]-B[i];}return 0;});
  return keys;
}

function yunChunks(text){
  var t=String(text||"").replace(/\s+/g," ").trim(); if(!t) return [];
  var enders="。！？；\n"; var out=[]; var buf="";
  for(var i=0;i<t.length;i++){ buf+=t[i]; if(enders.indexOf(t[i])>=0 && buf.length>=120){ out.push(buf); buf=""; } }
  if(buf.trim()) out.push(buf);
  var fin=[]; out.forEach(function(s){ while(s.length>320){ fin.push(s.slice(0,320)); s=s.slice(320); } if(s) fin.push(s); });
  return fin.length?fin:[t];
}
/* ====== 云帆语音永久快取（IndexedDB · 与录音库完全隔离） ====== */
/* 每段语音一生只向 Worker 抓一次，之后秒播、离线可听，替 Worker 省成本。 */
/* 任何 IndexedDB 失败都自动走回网路抓取，绝不影响既有朗读与内建语音退路。 */
var TTS_DB="chendu321_tts";
function ttsDBopen(cb){
  try{ if(!window.indexedDB) return cb(null);
    var req=indexedDB.open(TTS_DB,1);
    req.onupgradeneeded=function(){ try{ var db=req.result;
      if(!db.objectStoreNames.contains("audio")) db.createObjectStore("audio");
    }catch(e){} };
    req.onsuccess=function(){ cb(req.result); };
    req.onerror=function(){ cb(null); };
  }catch(e){ cb(null); }
}
function ttsCacheGet(key,cb){ ttsDBopen(function(db){ if(!db) return cb(null);
  try{ var r=db.transaction("audio","readonly").objectStore("audio").get(key);
    r.onsuccess=function(){ cb(r.result||null); }; r.onerror=function(){ cb(null); };
  }catch(e){ cb(null); } }); }
function ttsCachePut(key,blob){ ttsDBopen(function(db){ if(!db) return;
  try{ db.transaction("audio","readwrite").objectStore("audio").put(blob,key); }catch(e){}
}); }
/* 清空语音快取（保留给设定页按钮或主控台呼叫） */
window.ttsCacheClear=function(cb){ ttsDBopen(function(db){ if(!db) return cb&&cb(false);
  try{ var r=db.transaction("audio","readwrite").objectStore("audio").clear();
    r.onsuccess=function(){ yun.cache={}; if(typeof uiToast==="function") uiToast("已清空语音快取"); cb&&cb(true); };
    r.onerror=function(){ cb&&cb(false); };
  }catch(e){ cb&&cb(false); } }); };
function ttsNetFetch(piece,key){
  return fetch(TTS_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ voice:ttsVoiceName(), rate:yunRateAttr(), sil:TTS_SIL_SENTENCE, silc:TTS_SIL_COMMA, sile:TTS_SIL_ENUM, text:piece })
  }).then(function(res){
    if(!res.ok) throw new Error("TTS HTTP "+res.status);
    return res.blob();
  }).then(function(blob){
    try{ ttsCachePut(key,blob); }catch(e){}            /* 尽力存档，存不存得进都不影响播放 */
    var url=URL.createObjectURL(blob); yun.cache[key]=url; return url;
  });
}
/* 直接取回原始 Blob（不经 blob: URL）——避免 Service Worker 拦截 blob: 请求。
   快取有就用快取，没有才向 Worker 抓，并顺手存进 IndexedDB。 */
function yunFetchRaw(piece){
  var key=ttsVoiceName()+"|"+yunRateAttr()+"|"+TTS_SIL_SENTENCE+"|"+TTS_SIL_COMMA+"|"+TTS_SIL_ENUM+"|"+piece;
  return new Promise(function(resolve,reject){
    ttsCacheGet(key,function(blob){
      if(blob){ resolve(blob); return; }
      fetch(TTS_ENDPOINT,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ voice:ttsVoiceName(), rate:yunRateAttr(), sil:TTS_SIL_SENTENCE, silc:TTS_SIL_COMMA, sile:TTS_SIL_ENUM, text:piece })
      }).then(function(res){
        if(!res.ok) throw new Error("TTS HTTP "+res.status);
        return res.blob();
      }).then(function(b){
        try{ ttsCachePut(key,b); }catch(_){}
        try{ if(!yun.cache[key]) yun.cache[key]=URL.createObjectURL(b); }catch(_){}
        resolve(b);
      }, reject);
    });
  });
}
function yunFetch(piece){
  var key=ttsVoiceName()+"|"+yunRateAttr()+"|"+TTS_SIL_SENTENCE+"|"+TTS_SIL_COMMA+"|"+TTS_SIL_ENUM+"|"+piece;
  if(yun.cache[key]) return Promise.resolve(yun.cache[key]);   /* 本次工作阶段记忆体快取，最快 */
  return new Promise(function(resolve){
    ttsCacheGet(key,function(blob){
      if(blob){
        try{ var url=URL.createObjectURL(blob); yun.cache[key]=url; resolve(url); return; }catch(e){}
      }
      resolve(ttsNetFetch(piece,key));                          /* 没存过或读取失败 → 网路抓取并顺手存档 */
    });
  });
}
function yunStop(){
  spk.token++; spk.active=false; spk.paused=false; spk.mode=""; spk.queue=[]; spk.idx=0; spk.curId="";
  spk.joined=false; try{ if(spk.joinedURL){ URL.revokeObjectURL(spk.joinedURL); spk.joinedURL=null; } }catch(_){}
  if(typeof spkMediaSession==="function") spkMediaSession("stop");
  if(yun.audio){ try{ yun.audio.pause(); }catch(_){} yun.audio.onended=null; yun.audio.onerror=null; }
  if(typeof updateSpeakButtons==="function") updateSpeakButtons();
}
function spkPos(a){
  try{ var ms=navigator.mediaSession; if(!ms||!ms.setPositionState||!isFinite(a.duration)||a.duration<=0) return;
    ms.setPositionState({duration:a.duration, position:Math.min(a.currentTime,a.duration), playbackRate:a.playbackRate||1});
  }catch(_){}
}
/* 背景连续播放（快开 + 一首歌）：
   1) 只等「第一小段」抓好 → 立刻开念，不必乾等整课下载完。
   2) 同一时间，六路并行把整课抓齐 → 位元组串接成单一 MP3 Blob。
   3) 全曲一就绪（通常在开念后几秒内、手机还在手上）→ 只换这一次音源，
      并跳到目前播到的位置接续。之后整堂课就是一首完整的歌，
      锁屏、关萤幕、切到别的 App 都不会中断、不会只播一段就停。
   每一小段抓过就永久存进 IndexedDB，第二次听是离线瞬开，连那一次换源都省了。 */
function yunPlayJoined(text, id, startIdx){
  var chunks=yunChunks(spkSanitize(text));
  if(!chunks.length){ yunStop(); return; }
  var start=(startIdx>0 && startIdx<chunks.length)?startIdx:0;
  var slice=chunks.slice(start);
  spk.curId=id||""; spk.curText=text||""; spk.queue=chunks; spk.idx=start+1;
  spk.active=true; spk.paused=false; spk.mode="yun"; spk.joined=true;
  var my=++spk.token;
  if(typeof spkMediaSession==="function") spkMediaSession("play");
  if(typeof updateSpeakButtons==="function") updateSpeakButtons();
  if(typeof uiToast==="function") uiToast("开始朗读，其余内容边听边下载…");
  persistSpkResume();

  var a=yunGetAudio();
  var phase="head", headEnded=false, headDur=0, fullURL=null, swapped=false;

  function keepURL(u){ try{ if(spk.joinedURL && spk.joinedURL!==u) URL.revokeObjectURL(spk.joinedURL); }catch(_){} spk.joinedURL=u; }
  function attachSeek(){
    try{ var ms=navigator.mediaSession; if(!ms) return;
      ms.setActionHandler("seekto", function(e){ try{ if(e.seekTime!=null){ a.currentTime=e.seekTime; spkPos(a);} }catch(_){}});
      ms.setActionHandler("seekforward", function(){ try{ a.currentTime=Math.min(a.duration||0, a.currentTime+15); spkPos(a);}catch(_){}});
      ms.setActionHandler("seekbackward", function(){ try{ a.currentTime=Math.max(0, a.currentTime-15); spkPos(a);}catch(_){}});
    }catch(_){}
  }
  function wire(){
    a.onerror=function(){ if(my===spk.token) yunStop(); };
    a.ontimeupdate=function(){ if(my===spk.token) spkPos(a); };
    a.onloadedmetadata=function(){ if(my===spk.token) spkPos(a); };
    a.onended=function(){
      if(my!==spk.token) return;
      if(phase==="full"){ maybeClearResumeOnComplete(); yunStop(); return; }
      headEnded=true;
      if(isFinite(a.duration)) headDur=a.duration;
      if(fullURL) swapToFull();   /* 第一小段念完、全曲剛好就緒 → 無縫接上 */
    };
  }
  function swapToFull(){
    if(my!==spk.token || swapped || !fullURL) return;
    swapped=true; phase="full";
    var at = headEnded ? (headDur||0) : (a.currentTime||0);
    a.src=fullURL; keepURL(fullURL);
    a.onloadedmetadata=function(){
      if(my!==spk.token) return;
      try{ if(at>0 && isFinite(a.duration) && at<a.duration) a.currentTime=at; }catch(_){}
      spkPos(a);
    };
    var p=a.play(); if(p&&p.catch) p.catch(function(){ if(my===spk.token) yunStop(); });
  }

  /* ① 第一小段：抓到就開念 */
  yunFetchRaw(slice[0]).then(function(b){
    if(my!==spk.token) return;
    var u=URL.createObjectURL(new Blob([b],{type:"audio/mpeg"}));
    keepURL(u); wire(); attachSeek();
    a.src=u;
    if(slice.length===1){ swapped=true; phase="full"; }
    var p=a.play(); if(p&&p.catch) p.catch(function(){ if(my===spk.token) yunStop(); });
  }, function(){
    if(my!==spk.token) return;
    spk.active=false;
    if(typeof uiToast==="function") uiToast("云端语音连不上，改用装置内建声音（若没声音请再按一次朗读）");
    spkToggleNative(spk.curText||"", spk.curId);
  });

  /* ② 同時六路並行抓齊整課 → 串成一首 → 只換這一次音源 */
  if(slice.length>1){
    var res=new Array(slice.length), done=0, next=0, running=0, CONC=6;
    var pump=function(){
      while(running<CONC && next<slice.length){
        (function(i){ running++;
          yunFetchRaw(slice[i]).then(function(b){ res[i]=b; }, function(){}).then(function(){
            running--; done++;
            if(my!==spk.token) return;
            if(done>=slice.length){
              var parts=res.filter(Boolean);
              if(parts.length===slice.length){
                try{ fullURL=URL.createObjectURL(new Blob(parts,{type:"audio/mpeg"})); }catch(_){ return; }
                swapToFull();
              }
              return;
            }
            pump();
          });
        })(next++);
      }
    };
    pump();
  }
}
window.spkSetBg=function(on){ state.bgPlay=!!on; try{ saveState(); }catch(_){}
  if(typeof uiToast==="function") uiToast(on?"已开启背景连续播放 · 锁屏也能一路听完":"已关闭，恢复逐句播放");
  if(typeof renderSpkSheet==="function") renderSpkSheet(); };

function yunToggle(text, id, startIdx){
  /* 正在念同一段 → 暂停／续播 */
  if(spk.active && spk.curId===id){
    if(spk.paused) spkResumeCurrent(); else spkPauseCurrent();
    return;
  }
  spkStop();                 /* 先停掉任何在播的（含内建） */
  yunUnlock();               /* ← 在点击手势内解锁 iOS 音讯 */
  if(state.bgPlay){ yunPlayJoined(text, id, startIdx); return; }
  spk.queue=yunChunks(spkSanitize(text));
  spk.curId=id||"";
  spk.curText=text||"";      /* 暂存全文：首段失败回退内建语音时用 */
  yunRunFrom((startIdx&&startIdx>0&&startIdx<spk.queue.length)?startIdx:0);
}
/* 从 spk.queue 的指定段开始播放（重用既有队列）；初次播放与「续播」共用，
   续播时不依赖可能已被 iOS 回收的 audio 元素，而是直接从暂停的那一段重念，最可靠。 */
function yunRunFrom(startIdx){
  var my=++spk.token;
  spk.idx=(startIdx>0 && startIdx<spk.queue.length)?startIdx:0;
  spk.active=true; spk.paused=false; spk.mode="yun";
  if(typeof spkMediaSession==="function") spkMediaSession("play");
  if(typeof updateSpeakButtons==="function") updateSpeakButtons();
  function step(){
    if(my!==spk.token) return;
    if(spk.idx>=spk.queue.length){ maybeClearResumeOnComplete(); yunStop(); return; }
    var first=(spk.idx===0);
    var piece=spk.queue[spk.idx++];
    persistSpkResume();   /* 每段即时记录进度：锁屏/切换/退出等任何中断都能从此续播 */
    yunFetch(piece).then(function(url){
      if(my!==spk.token) return;
      if(spk.idx<spk.queue.length){ yunFetch(spk.queue[spk.idx]).catch(function(){}); }
      if(spk.idx+1<spk.queue.length){ yunFetch(spk.queue[spk.idx+1]).catch(function(){}); } /* 预抓下一段，换段更顺 */
      var a=yunGetAudio(); a.onended=null; a.onerror=null;
      a.src=url;
      a.onended=function(){ if(my===spk.token) step(); };
      a.onerror=function(){ if(my===spk.token) step(); };
      var p=a.play();
      if(p && p.catch) p.catch(function(){ if(my===spk.token) step(); });
    }).catch(function(){
      if(my!==spk.token) return;
      if(first){
        /* 第一段就失败：云帆不可用 → 整段改用装置内建语音，app 不中断 */
        if(typeof uiToast==="function") uiToast("云帆语音暂时连不上，改用装置内建声音");
        spk.active=false;
        spkToggleNative(spk.curText||"", spk.curId);
      }else{
        step();  /* 中途某段失败：跳过、续念下一段 */
      }
    });
  }
  step();
}
window.yunToggle=yunToggle;
window.yunStop=yunStop;

/* ============ 朗读派发器：优先云帆，否则内建（两者共用同一颗按钮） ============ */
function spkToggle(text, id, startIdx){
  /* 小智（id 以 msg 开头）固定走云端固定声音，与课文所选无关 */
  if(id && id.indexOf("msg")===0 && yun.ready) return yunToggle(text, id, startIdx);
  if(yunEnabled()) return yunToggle(text, id, startIdx);
  return spkToggleNative(text, id, startIdx);
}

function spkToggleNative(text, id, startIdx){
  if(!spk.supported){ if(typeof uiToast==="function") uiToast("这台装置不支援语音朗读"); return; }
  // 正在念同一段 → 暂停／续播
  if(spk.active && spk.curId===id){
    if(spk.paused) spkResumeCurrent(); else spkPauseCurrent();
    return;
  }
  spkStop();
  spk.queue = spkChunks(spkSanitize(text));
  spk.curId = id||"";
  spk.curText = text||"";
  nativeRunFrom((startIdx&&startIdx>0&&startIdx<spk.queue.length)?startIdx:0);
}
/* 从 spk.queue 的指定段开始（内建语音）；初次播放与「续播」共用，
   续播时从暂停的那一段重念，避免 iOS 上 speechSynthesis.resume() 不稳定。 */
function nativeRunFrom(startIdx){
  if(!spk.supported) return;
  var my = ++spk.token;
  spk.idx = (startIdx>0 && startIdx<spk.queue.length)?startIdx:0;
  spk.active = true; spk.paused=false; spk.mode="native";
  if(typeof spkMediaSession==="function") spkMediaSession("play");
  var voice = spkVoice();
  try{ window.speechSynthesis.cancel(); }catch(_){}   /* 清掉残留，避免叠音 */
  function step(){
    if(my!==spk.token) return;            // 已被新的朗读或停止取代
    if(spk.idx >= spk.queue.length){ maybeClearResumeOnComplete(); spkStop(); return; }
    var u = new SpeechSynthesisUtterance(spk.queue[spk.idx++]);
    persistSpkResume();   /* 每段即时记录进度：任何中断都能从此续播 */
    u.lang = (voice && voice.lang) ? voice.lang : "zh-CN";
    if(voice) u.voice = voice;
    u.rate = (typeof state.spkRate==="number" ? state.spkRate : 1.0); u.pitch = 1.0;
    u.onend = function(){ if(my===spk.token) step(); };
    u.onerror = function(){ if(my===spk.token) step(); };
    try{ window.speechSynthesis.speak(u); }catch(_){ spkStop(); }
  }
  if(typeof updateSpeakButtons==="function") updateSpeakButtons();
  step();
}
// iOS 有时首次取不到语音清单，先触发一次载入
if(spk.supported){
  try{
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = function(){
      var sheet=document.getElementById("spk-sheet");
      if(sheet && sheet.style.display==="block" && typeof renderSpkSheet==="function") renderSpkSheet();
    };
  }catch(_){}
}
function updateSpeakButtons(){
  // 未播=🔊朗读，播放中=⏸暂停，暂停中=▶️继续
  var btns = document.querySelectorAll("[data-spk]");
  btns.forEach(function(b){
    var mine = spk.active && spk.curId===b.getAttribute("data-spk");
    var ic = b.querySelector(".spk-ic"); var tx = b.querySelector(".spk-tx");
    if(mine && spk.paused){ if(ic) ic.textContent="▶️"; if(tx) tx.textContent="继续"; }
    else if(mine){ if(ic) ic.textContent="⏸"; if(tx) tx.textContent="暂停"; }
    else { if(ic) ic.textContent="🔊"; if(tx) tx.textContent=(b.getAttribute("data-spk-label")||"朗读"); }
    b.classList.toggle("spk-on", mine);
  });
  if(typeof updateStopBar==="function") updateStopBar();
}

/* ====== 预先下载整课语音（重用朗读管线 → 与播放键值完全一致，播放必命中快取） ====== */
/* 把整课语音一次抓进 IndexedDB，之后离线可听、且不再耗用 Worker。失败段落可再按一次补齐。 */
window.spkPreloadLesson = function(){
  var l = state.lesson;
  if(!l){ if(typeof uiToast==="function") uiToast("请先进入一课再下载"); return; }
  if(!yunEnabled()){ if(typeof uiToast==="function") uiToast("目前是装置内建语音，本来就能离线使用"); return; }
  if(window.__spkPreloadBusy) return;
  var chunks = yunChunks(spkSanitize(xzLessonFullText(l, true)));
  if(!chunks.length){ if(typeof uiToast==="function") uiToast("这一课没有可下载的语音内容"); return; }
  window.__spkPreloadBusy = true;
  var total = chunks.length, ok = 0, fail = 0, started = 0, running = 0, CONC = 3;
  function eachBtn(fn){ ["spk-preload-btn","rd-preload-btn"].forEach(function(id){ var b=document.getElementById(id); if(b) fn(b); }); }
  function label(t){ eachBtn(function(b){ b.textContent = t; }); }
  function disable(d){ eachBtn(function(b){ b.disabled = !!d; }); }
  disable(true); label("下载中… 0/" + total);
  function pump(){
    while(running < CONC && started < chunks.length){
      var piece = chunks[started++]; running++;
      yunFetch(piece).then(function(){ ok++; }, function(){ fail++; }).then(function(){
        running--; label("下载中… " + (ok + fail) + "/" + total); pump();
      });
    }
    if(running === 0 && started >= chunks.length){
      window.__spkPreloadBusy = false; disable(false);
      if(fail){ label("已下载 " + ok + "/" + total + "（稍后可再按一次补齐）"); if(typeof uiToast==="function") uiToast("大致下载完成，少数段落可稍后重试"); }
      else { label("✓ 整课语音已下载，离线可听"); if(typeof uiToast==="function") uiToast("整课语音已下载，之后离线也能听"); }
    }
  }
  pump();
};

function spkGuessGender(v){
  var s=(v.name+" "+(v.voiceURI||"")).toLowerCase();
  if(/male|男|yunjhe|yun-?jhe|kangkang|yunyang|zhiyu.*male/.test(s)) return "男";
  if(/female|女|mei-?jia|meijia|tingting|huihui|xiaoxiao|yaoyao|sinji/.test(s)) return "女";
  return "";
}

function xzClean(s){return String(s||"").split("⟦b:").join("").split("⟦s:").join("").split("⟦g:").join("").split("⟧").join("");}

function xzLessonFullText(l, spk){
  if(!l) return "";
  var P=[];
  function clean(s){ return xzClean(String(s||"")).split("\n").join(" ").replace(/\s+/g," ").trim(); }
  function lab(tag, say){ return spk ? say : ("〔"+tag+"〕"); }
  // 开场：问安 + 自然带入课题（朗读）／结构标签（AI 背景）
  if(spk){
    if(l.greet) P.push("平安！"+clean(l.greet)+"。");
    P.push("现在，我们一起来读第"+(l.n||"")+"课，"+clean(String(l.title||"").split("\n").join("，"))+"。");
  } else {
    if(l.greet) P.push("〔问安〕"+clean(l.greet));
  }
  // 主题经文
  if(l.verse){
    if(spk) P.push("我们先来读今天的主题经文，"+clean(l.verse_ref||"")+"。"+clean(l.verse));   // 主题经文：先口语化说明出处，再读经文
    else    P.push("〔主题经文〕"+clean(l.verse)+"　"+clean(l.verse_ref||""));
  }
  if(l.bigidea) P.push(lab("核心观念","今天这一课的核心，是这样的。")+clean(l.bigidea));
  if(l.lead)    P.push(lab("引言","我们先一起进入今天的内容。")+clean(l.lead));
  (l.sections||[]).forEach(function(sec){
    var h=clean(sec.h), paras=(sec.paras||[]).map(clean).join(" ");
    if(spk) P.push(h.replace(/^([一二三四五六七八九十])/,"第$1，")+"。"+paras);   // 第一，标题。内容
    else    P.push("〔"+h.replace(/^([一二三四五六七八九十])/,"$1、")+"〕"+paras);
    if(sec.pq) P.push((spk?"我们停下来，想一想。":"（反思）")+clean(sec.pq));
    if(sec.deeper){
      var _dq=clean(sec.deeper.q).replace(/^[〔【\[]?\s*想更深\s*[〕】\]]?\s*[？?：:、，,\s]*/,"");
      var _da=clean(sec.deeper.a);
      if(spk){
        var _s="我们再想得更深一点。";
        if(_dq) _s+=_dq;
        if(_da) _s+=(_dq?"　":"")+_da;
        if(_dq||_da) P.push(_s);
      } else {
        var _seg="";
        if(_dq) _seg+="问："+_dq;
        if(_da) _seg+=(_seg?"　":"")+"答："+_da;
        if(_seg) P.push("〔想更深〕"+_seg);
      }
    }
  });
  if(l.focus) P.push(lab("对焦","现在，把焦点对准耶稣。")+clean(l.focus));
  if(l.hope)  P.push(lab("盼望","这是我们的盼望。")+clean(l.hope.t)+" "+(l.hope.paras||[]).map(clean).join(" "));
  if(l.still) P.push(lab("静默","现在，让我们安静下来，在主面前默想。")+clean(l.still));
  if(l.steps&&l.steps.length) P.push(lab("操练","今天，我们可以这样操练。")+(spk?l.steps.map(function(s,i){return "第"+spkOrdCN(i+1)+"，"+clean(s.act);}).join(" "):l.steps.map(function(s){return clean(s.act);}).join("；")));
  if(l.declare) P.push(lab("宣告","让我们一起，开口宣告。")+clean(l.declare));
  if(l.share&&l.share.length) P.push(lab("分享题","也留几个问题，我们一起分享。")+(spk?l.share.map(function(s,i){return "第"+spkOrdCN(i+1)+"，"+(s.tag?(clean(s.tag)+"。"):"")+clean(s.q);}).join(" "):l.share.map(function(s){return (s.tag?("["+s.tag+"] "):"")+clean(s.q);}).join("　")));
  return P.join("\n");
}

async function xzCall(){
  chat.busy=true; renderChat(); xzScrollBottom();
  /* 离线时直接给温暖回覆，不让使用者空等 */
  if(typeof navigator!=="undefined" && navigator.onLine===false){
    chat.msgs.push({role:"assistant",text:"目前似乎没有网路，小智暂时陪不了你 🙏\n别忘了——最好的同伴是圣灵与神的话，你随时可以直接向主倾心吐意。"});
    chat.busy=false; renderChat(); xzScrollBottom(); return;
  }
  /* 逾时保护：30 秒没回应就中止，避免一直转圈 */
  var ctrl=(typeof AbortController!=="undefined")?new AbortController():null;
  var timer=ctrl?setTimeout(function(){try{ctrl.abort();}catch(_){}} ,30000):null;
  try{
    const res=await fetch(XZ_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      signal:ctrl?ctrl.signal:undefined,
      body:JSON.stringify({
        model:XZ_MODEL, max_tokens:1000,
        system:xzSystem(),
        messages:chat.msgs.map(function(m){return {role:m.role,content:m.text};})
      })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    var text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n").trim();
    if(!text) text="小智一时想不出合适的话，但神的话永不落空。要不要换个方式再问问看？";
    chat.msgs.push({role:"assistant",text:text});
  }catch(e){
    var aborted=e&&(e.name==="AbortError");
    chat.msgs.push({role:"assistant",text:(aborted?"小智等候得有点久，先暂停一下 🙏 请稍后再试。":"小智暂时连不上线，请稍后再试 🙏")+"\n别忘了——最好的同伴是圣灵与神的话，你随时可以直接向主倾心吐意。"});
  }finally{
    if(timer) clearTimeout(timer);
  }

function attachFabDrag(fab){
  if(!fab || fab.__dragWired) return; fab.__dragWired=true;
  var sx=0,sy=0,ox=0,oy=0,moved=false,dragging=false;
  fab.addEventListener("pointerdown",function(e){

    sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top; moved=false; dragging=true;
    fab.style.transition="none";
    try{fab.setPointerCapture(e.pointerId);}catch(_){}
  });
  fab.addEventListener("pointermove",function(e){
    if(!dragging) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved && (Math.abs(dx)>4||Math.abs(dy)>4)) moved=true;
    if(!moved) return;
    var w=fab.offsetWidth, h=fab.offsetHeight;
    var nx=Math.max(6,Math.min(ox+dx, window.innerWidth-w-6));
    var ny=Math.max(6,Math.min(oy+dy, window.innerHeight-h-6));
    fab.style.left=nx+"px"; fab.style.top=ny+"px"; fab.style.right="auto"; fab.style.bottom="auto";
  });
  function endDrag(e){
    if(!dragging) return; dragging=false; fab.style.transition="";
    try{fab.releasePointerCapture(e.pointerId);}catch(_){}
    if(moved){
      var r=fab.getBoundingClientRect();
      state.xzPos={x:Math.round(r.left), y:Math.round(r.top)}; saveState();
      window.__xzJustDragged=true; setTimeout(function(){window.__xzJustDragged=false;},350);
    }
  }
  fab.addEventListener("pointerup",endDrag);
  fab.addEventListener("pointercancel",endDrag);
}

function sClean(s){return String(s||"").split("⟦b:").join("").split("⟦s:").join("").split("⟦g:").join("").split("⟧").join("").split("\n").join(" ");}
/* 搜寻索引改为「第一次搜寻才建立」，开机不再扫全部课程，加快启动 */
var SEARCH_INDEX=null;
function getSearchIndex(){
  if(SEARCH_INDEX) return SEARCH_INDEX;
  SEARCH_INDEX=LESSONS.map(function(l){
    var parts=[];
    function add(t){if(t)parts.push(sClean(t));}
    add(l.title);add(l.unit);add(l.verse);add(l.verse_ref);add(l.bigidea);add(l.lead);add(l.focus);
    (l.sections||[]).forEach(function(sec){add(sec.h);(sec.paras||[]).forEach(add);if(sec.pq)add(sec.pq);if(sec.deeper){add(sec.deeper.q);add(sec.deeper.a);}});
    if(l.hope){add(l.hope.t);(l.hope.paras||[]).forEach(add);}
    (l.share||[]).forEach(function(sh){add(sh.q);});
    return {n:l.n,no:l.no,title:sClean(l.title),unit:sClean(l.unit),verse:sClean(l.verse),vref:l.verse_ref||"",hay:parts.join("　")};
  });
  return SEARCH_INDEX;
}
function searchLessons(q){
  q=(q||"").trim(); if(!q) return [];
  var ql=q.toLowerCase(), res=[];
  getSearchIndex().forEach(function(it){
    var score=0;
    if(it.title.toLowerCase().indexOf(ql)>=0) score+=100;
    if((it.verse+" "+it.vref).toLowerCase().indexOf(ql)>=0) score+=40;
    var hayL=it.hay.toLowerCase(), idx=0, c=0;
    while((idx=hayL.indexOf(ql,idx))>=0){c++;idx+=ql.length;if(c>30)break;}
    score+=c;
    if(score>0) res.push({it:it,score:score});
  });
  res.sort(function(a,b){return b.score-a.score||a.it.n-b.it.n;});
  return res.slice(0,60).map(function(r){return r.it;});
}
function sHi(text,q){
  var t=String(text||""), tl=t.toLowerCase(), ql=q.toLowerCase(), pos=ql?tl.indexOf(ql):-1;
  if(pos<0) return esc(t);
  return esc(t.slice(0,pos))+'<mark class="s-hl">'+esc(t.slice(pos,pos+ql.length))+'</mark>'+esc(t.slice(pos+ql.length));
}
function sSnip(it,q){
  var ql=q.toLowerCase(), src=it.verse, pos=src.toLowerCase().indexOf(ql);
  if(pos<0){src=it.hay;pos=src.toLowerCase().indexOf(ql);}
  if(pos<0) return esc(it.verse).slice(0,70);
  var start=Math.max(0,pos-16), end=Math.min(src.length,pos+ql.length+44);
  return (start>0?"…":"")+esc(src.slice(start,pos))+'<mark class="s-hl">'+esc(src.slice(pos,pos+ql.length))+'</mark>'+esc(src.slice(pos+ql.length,end))+(end<src.length?"…":"");
}

function mtRound(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function mtSpaced(ctx,text,cx,y,gap){
  var chars=Array.from(text||"");
  var widths=chars.map(function(c){return ctx.measureText(c).width;});
  var total=widths.reduce(function(a,b){return a+b;},0)+gap*Math.max(0,chars.length-1);
  var x=cx-total/2; var pa=ctx.textAlign; ctx.textAlign="left";
  for(var i=0;i<chars.length;i++){ctx.fillText(chars[i],x,y);x+=widths[i]+gap;}
  ctx.textAlign=pa;
}
var MT_NOSTART="，。、；：！？）」』】．，。！？：；）]";
function mtWrap(ctx,text,maxW){
  var lines=[], line=""; var chars=Array.from(text||"");
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    if(ch==="\n"){lines.push(line);line="";continue;}
    var test=line+ch;
    if(line && ctx.measureText(test).width>maxW && MT_NOSTART.indexOf(ch)===-1){lines.push(line);line=ch;}
    else line=test;
  }
  if(line) lines.push(line);
  return lines;
}
function mtStripCore(s){
  s=String(s||"");
  if(s.indexOf("本课核心")===0){ var p=s.indexOf("："); if(p<0)p=s.indexOf(":"); if(p>=0) return s.slice(p+1); }

function mtFirstSentence(s){
  s=String(s||""); var marks=["。","！","？"], best=-1;
  for(var i=0;i<marks.length;i++){var p=s.indexOf(marks[i]); if(p>=0&&(best<0||p<best))best=p;}

  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  var l=state.lesson; if(!l) return;
  var dataUrl;
  try{ dataUrl=mtDraw(l,mtState.theme,mtState.content,mtState.shape); }catch(e){ blessShowError(n,e); return; }
  var img=new Image();
  img.onload=function(){
    try{
      var W=img.naturalWidth||1080, H=img.naturalHeight||1440;
      var cv=document.createElement("canvas"); cv.width=W; cv.height=H; var cxt=cv.getContext("2d");
      blessState.t0=Date.now();
      function frame(){
        cxt.drawImage(img,0,0,W,H);
        var t=(Date.now()-blessState.t0)/1000, a=0.3+0.4*(0.5+0.5*Math.sin(t*3));
        cxt.save(); cxt.globalAlpha=a; cxt.fillStyle="#D14B4B"; cxt.beginPath(); cxt.arc(78,H-78,17,0,Math.PI*2); cxt.fill(); cxt.restore();
        blessState.raf=requestAnimationFrame(frame);
      }
      frame();
      var vstream=cv.captureStream(20); blessState.vstream=vstream;
      navigator.mediaDevices.getUserMedia({audio:true}).then(function(astream){
        blessState.astream=astream;
        var tracks=vstream.getVideoTracks().concat(astream.getAudioTracks());
        var combined=new MediaStream(tracks);
        var mime=blessMime(), mr;
        try{ mr=mime? new MediaRecorder(combined,{mimeType:mime}) : new MediaRecorder(combined); }catch(e){ mr=new MediaRecorder(combined); }
        blessState.mr=mr; blessState.chunks=[];
        mr.ondataavailable=function(e){ if(e.data&&e.data.size) blessState.chunks.push(e.data); };
        mr.onstop=function(){
          var type=(blessState.chunks[0]&&blessState.chunks[0].type)||mime||"video/webm";
          var blob=new Blob(blessState.chunks,{type:type});
          blessStopTracks(); blessTimerStop();
          blessShow(n,blob);
        };
        mr.start(); blessTimerStart(); blessShowRecording(n);
      }).catch(function(err){ blessStopTracks(); blessShowError(n,err); });
    }catch(e){ blessStopTracks(); blessShowError(n,e); }
  };
  img.onerror=function(){ blessShowError(n,{name:"img"}); };
  img.src=dataUrl;
};
window.blessStop=function(){ try{ if(blessState.mr&&blessState.mr.state!=="inactive") blessState.mr.stop(); }catch(e){} };
window.blessShare=async function(){
  if(!blessState.blob) return;
  var type=blessState.blob.type||"video/mp4";
  var ext=type.indexOf("webm")>=0?".webm":".mp4";
  var fname="晨读321祝福-第"+(state.lesson?state.lesson.n:"")+"课"+ext;
  try{
    var file=new File([blessState.blob],fname,{type:type});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:"晨读321 · 祝福"}); return; }
  }catch(e){}
  try{ var a=document.createElement("a"); a.href=blessState.url; a.download=fname; document.body.appendChild(a); a.click(); a.remove(); }catch(e){}
};
